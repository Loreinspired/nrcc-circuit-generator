<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NRCC Circuit · Monthly Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --navy: #0f1f3d;
      --navy-mid: #1a3260;
      --navy-light: #243e7a;
      --gold: #c9972c;
      --gold-light: #f0c96a;
      --cream: #fdf9f0;
      --cream-dark: #f4ede0;
      --text: #1a1a2e;
      --text-light: #5a6070;
      --border: #ddd4c2;
      --success: #1a6b3c;
      --danger: #9b1c1c;
      --white: #ffffff;
      --shadow: 0 4px 24px rgba(15, 31, 61, 0.12);
      --shadow-sm: 0 2px 8px rgba(15, 31, 61, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .app-header {
      background: var(--navy);
      padding: 24px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 3px solid var(--gold);
    }

    .app-header .cross {
      font-size: 28px;
      color: var(--gold);
    }

    .app-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--white);
      line-height: 1.1;
    }

    .app-header p {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 2px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ── LAYOUT ── */
    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    /* ── STEP INDICATOR ── */
    .steps-bar {
      display: flex;
      background: var(--white);
      border-radius: 14px;
      padding: 6px;
      margin-bottom: 28px;
      box-shadow: var(--shadow-sm);
      gap: 4px;
      overflow-x: auto;
    }

    .step-tab {
      flex: 1;
      padding: 10px 8px;
      border-radius: 10px;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-light);
      cursor: default;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      min-width: 72px;
    }

    .step-tab .step-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      transition: all 0.2s;
    }

    .step-tab.active {
      background: var(--navy);
      color: var(--white);
    }

    .step-tab.active .step-num {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(201, 151, 44, 0.15);
    }

    .step-tab.done {
      color: var(--success);
    }

    .step-tab.done .step-num {
      border-color: var(--success);
      background: #e8f5ee;
      color: var(--success);
    }

    /* ── CARDS ── */
    .card {
      background: var(--white);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--cream-dark);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .card-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      color: var(--navy);
    }

    .card-subtitle {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 2px;
    }

    /* ── FORM ELEMENTS ── */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .form-row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    label.field-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-light);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    input[type="text"],
    input[type="number"],
    select,
    textarea {
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--cream);
      width: 100%;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--navy-light);
      box-shadow: 0 0 0 3px rgba(26, 50, 96, 0.1);
      background: var(--white);
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    /* Radio-style day picker */
    .radio-group {
      display: flex;
      gap: 8px;
    }

    .radio-option {
      flex: 1;
      position: relative;
    }

    .radio-option input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
    }

    .radio-option label {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 8px;
      border: 2px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-light);
      background: var(--cream);
      transition: all 0.15s;
      user-select: none;
      text-transform: none;
      letter-spacing: 0;
    }

    .radio-option input:checked+label {
      border-color: var(--navy);
      background: var(--navy);
      color: var(--white);
    }

    /* ── WEEK CARDS ── */
    .week-card {
      border: 1.5px solid var(--border);
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .week-card-head {
      background: var(--navy);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .week-card-head .week-label {
      font-weight: 700;
      font-size: 13px;
      color: var(--white);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .week-range {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.55);
    }

    .week-body {
      padding: 12px 16px;
    }

    .event-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid var(--cream-dark);
    }

    .event-row:last-child {
      border-bottom: none;
    }

    .event-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-diesel {
      background: #e67e22;
    }

    .dot-petrol {
      background: #2980b9;
    }

    .event-name {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
    }

    .event-date-text {
      font-size: 12px;
      color: var(--text-light);
      font-variant-numeric: tabular-nums;
      min-width: 140px;
      text-align: right;
    }

    .event-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 700;
      letter-spacing: 0.05em;
      min-width: 52px;
      text-align: center;
    }

    .badge-d {
      background: #fef3e2;
      color: #c05c00;
    }

    .badge-p {
      background: #e3f0fc;
      color: #1560a8;
    }

    .rehearsal-override {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: 8px;
    }

    .rehearsal-override select {
      padding: 4px 8px;
      font-size: 12px;
      border-radius: 8px;
      width: auto;
      background: var(--white);
      border-color: var(--border);
    }

    .special-events-area {
      padding-top: 8px;
    }

    .special-events-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 8px;
    }

    .special-event-row {
      display: grid;
      grid-template-columns: 2fr 1fr 70px 90px 65px 32px;
      gap: 6px;
      align-items: end;
      margin-bottom: 8px;
    }

    .special-event-row input[type="number"] {
      padding: 8px 10px;
    }

    .special-event-row input[type="date"] {
      padding: 8px 10px;
      font-size: 13px;
    }

    .special-event-row input[type="text"] {
      padding: 8px 10px;
    }

    /* ── LIST ITEMS (goals, team) ── */
    .list-item {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
      padding: 12px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      transition: all 0.2s ease;
      box-shadow: var(--shadow-sm);
    }

    .list-item:hover {
      border-color: var(--navy-light);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(15, 31, 61, 0.08);
    }

    .list-item input {
      flex: 1;
      border: none;
      background: transparent;
      font-weight: 500;
      color: var(--text);
      font-size: 14px;
    }

    .list-item input:focus {
      outline: none;
    }

    .list-num {
      font-size: 12px;
      font-weight: 800;
      color: var(--gold);
      width: 24px;
      text-align: center;
      flex-shrink: 0;
      opacity: 0.8;
    }

    .service-badge {
      font-size: 10px;
      font-weight: 800;
      padding: 3px 8px;
      border-radius: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge-sunday {
      background: #e0f2fe;
      color: #0369a1;
    }

    .badge-midweek {
      background: #fef3c7;
      color: #92400e;
    }

    .badge-other {
      background: #f3f4f6;
      color: #4b5563;
    }

    /* ── CHECK-IN MODE ── */
    .checking-in .app-header,
    .checking-in .steps-bar {
      display: none !important;
    }

    .checking-in .container {
      max-width: 500px;
      padding-top: 60px;
    }

    .checking-in .card {
      border-top: 4px solid var(--gold);
    }

    /* ── BUTTONS ── */
    .btn {
      padding: 10px 20px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .btn-navy {
      background: var(--navy);
      color: var(--white);
    }

    .btn-navy:hover {
      background: var(--navy-light);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(15, 31, 61, 0.3);
    }

    .btn-outline {
      background: var(--white);
      color: var(--text);
      border: 1.5px solid var(--border);
    }

    .btn-outline:hover {
      background: var(--cream);
    }

    .btn-ghost-add {
      background: transparent;
      color: var(--navy-light);
      border: 1.5px dashed var(--navy-light);
      width: 100%;
      justify-content: center;
      opacity: 0.75;
      padding: 8px;
      font-size: 13px;
      border-radius: 8px;
      margin-top: 4px;
    }

    .btn-ghost-add:hover {
      opacity: 1;
      background: rgba(26, 50, 96, 0.05);
    }

    .btn-icon {
      width: 32px;
      height: 32px;
      padding: 0;
      border-radius: 8px;
      justify-content: center;
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      font-size: 13px;
      flex-shrink: 0;
    }

    .btn-icon:hover {
      background: #fee2e2;
    }

    .btn-sm {
      padding: 7px 14px;
      font-size: 13px;
    }

    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 24px;
    }

    /* ── ALERTS ── */
    .alert {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .alert-info {
      background: #eff6ff;
      color: #1e40af;
      border: 1px solid #bfdbfe;
    }

    .alert-warn {
      background: #fffbeb;
      color: #92400e;
      border: 1px solid #fcd34d;
    }

    /* ── GENERATE PAGE ── */
    .gen-hero {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
      border-radius: 16px;
      padding: 40px 32px;
      text-align: center;
      color: var(--white);
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    .gen-hero::before {
      content: '✝';
      position: absolute;
      font-size: 180px;
      color: rgba(255, 255, 255, 0.03);
      top: -20px;
      right: -20px;
      font-family: serif;
    }

    .gen-hero h2 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      margin-bottom: 6px;
    }

    .gen-hero .gen-sub {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      margin-bottom: 28px;
    }

    .gen-hero .month-chip {
      display: inline-block;
      background: var(--gold);
      color: var(--navy);
      font-weight: 700;
      font-size: 12px;
      padding: 4px 14px;
      border-radius: 20px;
      letter-spacing: 0.05em;
      margin-bottom: 20px;
    }

    .gen-btns {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-gen-excel {
      background: #16a34a;
      color: var(--white);
      padding: 14px 28px;
      font-size: 15px;
      border-radius: 12px;
    }

    .btn-gen-excel:hover {
      background: #15803d;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(22, 163, 74, 0.4);
    }

    .btn-gen-word {
      background: rgba(255, 255, 255, 0.15);
      color: var(--white);
      border: 2px solid rgba(255, 255, 255, 0.3);
      padding: 14px 28px;
      font-size: 15px;
      border-radius: 12px;
    }

    .btn-gen-word:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: translateY(-2px);
    }

    .summary-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .summary-table th {
      text-align: left;
      padding: 8px 12px;
      font-size: 11px;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 2px solid var(--border);
    }

    .summary-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--cream-dark);
    }

    .summary-table tr:last-child td {
      border-bottom: none;
    }

    .tag {
      display: inline-block;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 12px;
      font-weight: 600;
      margin-right: 4px;
    }

    .tag-d {
      background: #fef3e2;
      color: #c05c00;
    }

    .tag-p {
      background: #e3f0fc;
      color: #1560a8;
    }

    .tag-sp {
      background: #f0fdf4;
      color: #15803d;
    }

    /* ── ROSTER ── */
    .roster-grid {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .roster-grid th {
      background: var(--navy);
      color: var(--white);
      padding: 8px 12px;
      font-size: 11px;
      text-align: left;
    }

    .roster-grid td {
      padding: 7px 10px;
      border-bottom: 1px solid var(--cream-dark);
      vertical-align: middle;
    }

    .roster-grid tr:nth-child(even) td {
      background: #fafafa;
    }

    .roster-grid select {
      padding: 5px 8px;
      font-size: 12px;
      border-radius: 6px;
    }

    .role-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 12px;
      background: var(--navy);
      color: var(--white);
      letter-spacing: .05em;
    }

    /* ── PERFORMANCE TRACKER ── */
    .perf-table-wrap {
      overflow-x: auto;
    }

    .perf-table {
      border-collapse: collapse;
      font-size: 11px;
      min-width: 700px;
      width: 100%;
    }

    .perf-table th {
      background: var(--navy);
      color: var(--white);
      padding: 6px 8px;
      font-size: 10px;
      text-align: center;
      white-space: nowrap;
    }

    .perf-table th.name-col {
      text-align: left;
      min-width: 130px;
    }

    .perf-table td {
      padding: 4px 6px;
      border-bottom: 1px solid var(--cream-dark);
      border-right: 1px solid var(--cream-dark);
      text-align: center;
    }

    .perf-table td.name-col {
      text-align: left;
      font-weight: 600;
      font-size: 12px;
      background: #fafafa;
    }

    .perf-table select {
      padding: 3px 4px;
      font-size: 11px;
      border-radius: 5px;
      width: auto;
    }

    .date-hdr-sub {
      font-size: 9px;
      color: rgba(255, 255, 255, .7);
      display: block;
      font-weight: 400;
    }

    .score-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .score-card {
      background: var(--white);
      border-radius: 12px;
      padding: 12px;
      border: 1px solid var(--cream-dark);
      text-align: center;
    }

    .score-card .sc-name {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .score-card .sc-score {
      font-size: 22px;
      font-weight: 700;
    }

    .score-card .sc-label {
      font-size: 10px;
      color: var(--text-light);
    }

    .sc-a {
      color: #16a34a;
    }

    .sc-b {
      color: #ca8a04;
    }

    .sc-c {
      color: #dc2626;
    }

    /* ── SPIRITUAL ACTIVITIES ── */
    .spirit-section-head {
      background: #1b4332;
      color: var(--white);
      padding: 8px 14px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      border-radius: 8px 8px 0 0;
      margin-top: 14px;
    }

    .spirit-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .spirit-table th {
      background: #2d6a4f;
      color: var(--white);
      padding: 8px 10px;
      font-size: 11px;
      text-align: left;
    }

    .spirit-table td {
      padding: 7px 10px;
      border-bottom: 1px solid var(--cream-dark);
      text-align: center;
    }

    .spirit-table td.name-col {
      text-align: left;
      font-weight: 600;
    }

    .spirit-table td.total-col {
      background: #e8f5ee;
      color: #1a6b3c;
      font-weight: 700;
    }

    .save-note {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 12px;
      color: #1e40af;
      margin-bottom: 12px;
    }

    .save-note strong {
      display: block;
      margin-bottom: 4px;
    }

    .alert-success {
      background: #f0fdf4;
      color: #15803d;
      border: 1px solid #86efac;
    }

    @media (max-width: 600px) {
      .form-row {
        grid-template-columns: 1fr;
      }

      .form-row-3 {
        grid-template-columns: 1fr;
      }

      .special-event-row {
        grid-template-columns: 1fr 1fr 1fr;
      }

      .special-event-row .btn-icon {
        grid-column: span 3;
        width: 100%;
        border-radius: 8px;
      }
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1a6b3c;
      color: #fff;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .2);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .25s, transform .25s;
      z-index: 9999;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── SERVICE LOG DRAWER ── */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .45);
      z-index: 800;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }

    .drawer-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .drawer {
      position: fixed;
      top: 0;
      right: -520px;
      width: 500px;
      max-width: 95vw;
      height: 100vh;
      background: var(--white);
      box-shadow: -6px 0 32px rgba(0, 0, 0, .18);
      z-index: 900;
      transition: right .3s cubic-bezier(.4, 0, .2, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .drawer.open {
      right: 0;
    }

    .drawer-head {
      background: var(--navy);
      color: var(--white);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .drawer-head h3 {
      font-size: 16px;
      font-family: 'Playfair Display', serif;
    }

    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .log-card {
      background: var(--cream);
      border: 1px solid var(--cream-dark);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .log-card-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .log-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 8px;
    }

    .log-field label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .log-field input,
    .log-field textarea {
      font-size: 13px;
      padding: 7px 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      background: var(--white);
      color: var(--text);
    }

    .log-field textarea {
      resize: vertical;
      min-height: 60px;
    }

    .pin-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .55);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pin-box {
      background: var(--white);
      border-radius: 16px;
      padding: 32px;
      width: 300px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0, 0, 0, .25);
    }

    .pin-box h4 {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      color: var(--navy);
      margin-bottom: 6px;
    }

    .pin-box p {
      font-size: 12px;
      color: var(--text-light);
      margin-bottom: 16px;
    }

    .pin-input {
      width: 100%;
      text-align: center;
      font-size: 24px;
      letter-spacing: .4em;
      padding: 10px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-family: monospace;
      margin-bottom: 16px;
    }

    .step-tab .step-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
      margin-top: 2px;
      opacity: 0;
      transition: opacity .2s;
    }

    .step-tab .step-dot.filled {
      opacity: 1;
    }

    /* ── WEEK COST BREAKDOWN ── */
    .week-cost-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px;
      border-radius: 8px;
      margin-bottom: 4px;
      font-size: 13px;
    }

    .week-cost-row:nth-child(odd) {
      background: var(--cream);
    }

    .week-cost-label {
      color: var(--text-light);
      font-size: 12px;
    }

    .week-cost-amt {
      font-weight: 700;
      color: var(--navy);
    }

    /* ── PRINT ── */
    @media print {

      .app-header,
      .steps-bar,
      .nav-row,
      .btn,
      .gen-btns,
      .save-note {
        display: none !important;
      }

      body {
        background: #fff;
      }

      .card {
        box-shadow: none;
        border: 1px solid #ddd;
        page-break-inside: avoid;
      }

      .gen-hero {
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }
    }

    /* ── BIO DATA MODAL ── */
    .bio-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--cream);
      z-index: 2000;
      flex-direction: column;
      animation: fadeIn 0.3s ease;
    }

    .bio-modal-header {
      background: var(--navy);
      color: #fff;
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid var(--gold);
    }

    .bio-body {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
    }

    .bio-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .bio-table th {
      background: #f8f9fa;
      padding: 12px 16px;
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--text-light);
      border-bottom: 1px solid var(--border);
    }

    .bio-table td {
      padding: 10px 16px;
      border-bottom: 1px solid #f0f0f0;
    }

    .bio-table input {
      width: 100%;
      border: 1px solid transparent;
      padding: 6px 8px;
      font-size: 13px;
      border-radius: 6px;
      background: transparent;
      transition: all .2s;
    }

    .bio-table input:focus {
      background: var(--cream);
      border-color: var(--border);
      outline: none;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <!-- Toast -->
  <div class="toast" id="toast">✓ Saved</div>

  <!-- Service Log Drawer -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="serviceDrawer">
    <div class="drawer-head">
      <h3>📋 Service Log</h3>
      <div style="display:flex;gap:8px;align-items:center">
        <button onclick="openAdminView()"
          style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:5px 12px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">🔒
          Admin View</button>
        <button onclick="closeDrawer()"
          style="background:rgba(255,255,255,.12);color:#fff;border:none;width:30px;height:30px;border-radius:7px;font-size:16px;cursor:pointer">✕</button>
      </div>
    </div>
    <div class="drawer-body" id="drawerBody">Loading…</div>
  </div>

  <!-- PIN Modal -->
  <div class="pin-modal" id="pinModal" style="display:none">
    <div class="pin-box">
      <h4>🔒 Admin Access</h4>
      <p>Enter the admin password to continue</p>
      <input class="pin-input" id="pinInput" type="password" placeholder="Password"
        style="letter-spacing:0.1em;font-size:18px" oninput="checkPin()" onkeydown="if(event.key==='Enter')checkPin()">
      <div id="pinError" style="color:#dc2626;font-size:12px;margin-bottom:12px;min-height:16px"></div>
      <button onclick="closePinModal()"
        style="background:var(--cream);color:var(--text);border:1.5px solid var(--border);padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Cancel</button>
    </div>
  </div>

  <!-- Bio Data Modal -->
  <div class="bio-modal" id="bioModal">
    <div class="bio-modal-header">
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:24px">👤</span>
        <div>
          <h2 style="font-size:18px;margin:0">Departmental Bio Data</h2>
          <p style="font-size:11px;opacity:.7;margin:0;text-transform:uppercase;letter-spacing:.05em">NRCC Circuit
            Personnel Records</p>
        </div>
      </div>
      <div style="display:flex;gap:12px">
        <button class="btn btn-navy" onclick="downloadBioData()" style="padding:8px 16px;font-size:13px">📊 Export to
          Excel</button>
        <button class="btn btn-outline" onclick="closeBioModal()"
          style="padding:8px 16px;font-size:13px;color:#fff;border-color:rgba(255,255,255,.3)">Close</button>
      </div>
    </div>
    <div class="bio-body">
      <table class="bio-table">
        <thead>
          <tr>
            <th style="width:200px">Name</th>
            <th>Address</th>
            <th style="width:140px">Contact No.</th>
            <th>Email</th>
            <th style="width:120px">Cell Group</th>
            <th style="width:130px">Date of Birth</th>
          </tr>
        </thead>
        <tbody id="bioTableBody"></tbody>
      </table>
    </div>
  </div>

  <div class="app-header">
    <span class="cross">✝</span>
    <div style="flex:1">
      <h1>NRCC Circuit · Monthly Generator</h1>
      <p>ADO-EKITI Campus — Power, Light &amp; Sound Department</p>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button onclick="openDrawer()"
        style="background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);padding:7px 14px;font-size:12px;font-weight:600;border-radius:8px;cursor:pointer;font-family:inherit">📋
        Service Log</button>
      <button onclick="openBioModal()"
        style="background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);padding:7px 14px;font-size:12px;font-weight:600;border-radius:8px;cursor:pointer;font-family:inherit">👤
        Bio Data</button>
      <button onclick="clearData()"
        style="background:#fee2e2;color:#dc2626;border:1px solid #fecaca;padding:7px 14px;font-size:12px;font-weight:600;border-radius:8px;cursor:pointer;font-family:inherit">🗑
        Clear Data</button>
    </div>
  </div>

  <div class="container">
    <div class="steps-bar" id="stepsBar"></div>
    <div id="content"></div>
  </div>

  <script>
    // ══════════════════════════════════════════
    // HELPERS
    // ══════════════════════════════════════════
    const MONTHS = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    const DAYS = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    const SHORT_DAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

    function getWeekdaysInMonth(year, month, weekday) {
      const days = [];
      const d = new Date(year, month, 1);
      while (d.getMonth() === month) {
        if (d.getDay() === weekday) days.push(new Date(d));
        d.setDate(d.getDate() + 1);
      }
      return days;
    }
    function addDays(date, n) {
      const d = new Date(date);
      d.setDate(d.getDate() + n);
      return d;
    }
    function fmtXL(date) {
      if (!date) return '';
      const d = new Date(date);
      const dd = String(d.getDate()).padStart(2, '0');
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const yyyy = d.getFullYear();
      return `${dd}/${mm}/${yyyy}`;
    }
    function fmtFull(date) {
      if (!date) return '—';
      return new Date(date).toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
    }
    function fmtDisplay(date) {
      if (!date) return '—';
      return new Date(date).toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
    }
    function ceil10(n) { return Math.ceil(n / 10) * 10; }

    // Reheasal offset from Sunday: Thu=-3, Fri=-2, Sat=-1
    const REH_OFFSETS = { 4: -3, 5: -2, 6: -1 };
    function getRehDate(sunday, dayNum) {
      return addDays(sunday, REH_OFFSETS[dayNum] ?? -2);
    }
    function fmtISO(date) {
      if (!date) return '';
      const d = new Date(date);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }
    function dateKey(date) { return fmtISO(date); }
    function getActiveMembers() { return state.teamMembers.filter(m => m.trim()); }
    function getServiceDatesForRoster() {
      const dates = [];
      state.weeks.forEach(wk => {
        dates.push({ date: wk.wednesday, label: `Mid-Week — ${fmtDisplay(wk.wednesday)}` });
        dates.push({ date: wk.sunday, label: `Sunday — ${fmtDisplay(wk.sunday)}` });
        wk.specials.forEach(ev => {
          if (ev.name && ev.date) dates.push({ date: new Date(ev.date), label: `${ev.name} — ${fmtDisplay(new Date(ev.date))}` });
        });
      });
      return dates.filter(d => d.date).sort((a, b) => new Date(a.date) - new Date(b.date));
    }
    function calcMemberScore(member, svcDates) {
      // Filter for Service Days Only (Sundays and Mid-weeks)
      const serviceOnly = svcDates.filter(s => s.label.toLowerCase().includes('sunday') || s.label.toLowerCase().includes('mid-week'));
      let total = 0, possible = 0;
      serviceOnly.forEach(svc => {
        const dk = dateKey(svc.date);
        const p = state.servicePerformance[member]?.[dk] || {};
        const att = (state.memberAttendance[dk]?.entries || {})[member] || {};

        // Use memberAttendance if present, else fallback to servicePerformance
        const isPresent = att.present ?? (p.attended === 'Y');
        const arrival = att.arrivalTime || '';

        possible += 3; // OnTime, Dress, Attended
        if (isPresent) total++; // Attended

        // Arrival Time Logic
        let onTimeStatus = p.onTime;
        if (arrival) {
          const [h, m] = arrival.split(':').map(Number);
          const val = h * (m ? 60 : 1) + (m || 0); // handle H:MM or just H
          const isSunday = svc.label.toLowerCase().includes('sunday');
          if (isSunday) {
            if (val <= 7 * 60 + 10) onTimeStatus = 'Ideal';
            else if (val <= 7 * 60 + 20) onTimeStatus = 'Y';
            else onTimeStatus = 'N';
          } else {
            // Midweek - based on 18:00 start
            if (val <= 17 * 60) onTimeStatus = 'Ideal';
            else if (val <= 17 * 60 + 30) onTimeStatus = 'Y';
            else onTimeStatus = 'N';
          }
        }
        if (onTimeStatus === 'Ideal') total += 1.25; // Bonus for early
        else if (onTimeStatus === 'Y') total += 1;

        if (p.dressCode === 'Y') total++;

        // Tasks & Verified (optional/extra)
        if (p.tasksDone) { possible++; total += p.tasksDone === 'All' ? 1 : p.tasksDone === 'Most' ? .75 : p.tasksDone === 'Some' ? .5 : 0; }
        if (p.verified) { possible++; total += p.verified === 'All' ? 1 : p.verified === 'Most' ? .75 : p.verified === 'Some' ? .5 : 0; }
      });
      return possible === 0 ? 0 : Math.min(100, Math.round((total / possible) * 100));
    }

    // ══════════════════════════════════════════
    // STATE
    // ══════════════════════════════════════════
    const ROLE_DEFS = [
      { code: 'GEN', name: 'Generator Operator' },
      { code: 'MIC', name: 'Microphone Tech' },
      { code: 'HVAC', name: 'HVAC Operator' },
      { code: 'SND', name: 'Sound Engineer' },
      { code: 'REC', name: 'Sound Engineer (Recording)' },
      { code: 'EXT', name: 'External Sound' },
      { code: 'COORD', name: 'Service Coordinator' }
    ];
    const DEFAULT_STATE = {
      step: 1,
      month: new Date().getMonth(),
      year: new Date().getFullYear(),
      dieselPrice: 1000,
      petrolPrice: 845,
      defaultRehDay: 5,
      weeks: [],
      teamMembers: [''],
      goals: [
        'Listen to Messages of the week',
        'Re-listen to Sunday and Midweek messages',
        'Listen to service recordings and evaluate sound quality',
        'Sowing seed towards departmental purse'
      ],
      seedBalance: '',
      budgetBalance: '',
      specialActivities: '',
      roles: ROLE_DEFS.map(r => ({ ...r, primary: '', alt1: '', alt2: '' })),
      serviceAssignments: {},
      servicePerformance: {},
      spiritualActivities: {},
      adminPin: 'Circuit25',
      memberAttendance: {},
      bioData: [],
      whatsappGroup: ''
    };
    function loadState() {
      try {
        const s = localStorage.getItem('nrcc_circuit_state');
        if (s) {
          const parsed = JSON.parse(s);
          if (!parsed.roles) parsed.roles = ROLE_DEFS.map(r => ({ ...r, primary: '', alt1: '', alt2: '' }));
          if (!parsed.serviceAssignments) parsed.serviceAssignments = {};
          if (!parsed.servicePerformance) parsed.servicePerformance = {};
          if (!parsed.spiritualActivities) parsed.spiritualActivities = {};
          if (!parsed.serviceLog) parsed.serviceLog = {};
          if (!parsed.adminPin) parsed.adminPin = 'Circuit25';
          if (!parsed.memberAttendance) parsed.memberAttendance = {};
          if (!parsed.bioData) parsed.bioData = [];
          if (parsed.whatsappGroup === undefined) parsed.whatsappGroup = '';
          return parsed;
        }
      } catch (e) { }
      return JSON.parse(JSON.stringify(DEFAULT_STATE));
    }
    let _toastTimer = null;
    function showToast(msg) {
      const t = document.getElementById('toast');
      if (!t) return;
      t.textContent = msg || '\u2713 Saved';
      t.classList.add('show');
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
    }
    function saveState() {
      try { localStorage.setItem('nrcc_circuit_state', JSON.stringify(state)); showToast(); } catch (e) { }
    }
    function clearData() {
      if (!confirm('Clear all data and start fresh for a new month?')) return;
      localStorage.removeItem('nrcc_circuit_state');
      const fresh = JSON.parse(JSON.stringify(DEFAULT_STATE));
      fresh.month = new Date().getMonth();
      fresh.year = new Date().getFullYear();
      Object.keys(state).forEach(k => delete state[k]);
      Object.assign(state, fresh);
      renderCurrent();
    }
    let state = loadState();

    function computeWeeks() {
      const sundays = getWeekdaysInMonth(state.year, state.month, 0);
      const prev = state.weeks;

      state.weeks = sundays.map((sunday, i) => {
        const ex = prev[i] || {};
        const rehDayNum = ex.rehDayOverride ?? state.defaultRehDay;
        return {
          sunday,
          wednesday: addDays(sunday, -4),
          rehDayOverride: ex.rehDayOverride ?? null,
          rehDate: getRehDate(sunday, rehDayNum),
          specials: ex.specials ?? []
        };
      });
    }

    // ══════════════════════════════════════════
    // RENDER HELPERS
    // ══════════════════════════════════════════
    function stepHasData(n) {
      if (n === 1) return state.month !== undefined && state.year;
      if (n === 2) return state.weeks && state.weeks.length > 0;
      if (n === 3) return state.teamMembers.some(m => m.trim()) || state.seedBalance || state.budgetBalance;
      if (n === 4) return state.roles && state.roles.some(r => r.primary);
      if (n === 5) return Object.keys(state.servicePerformance).length > 0;
      if (n === 6) return Object.keys(state.spiritualActivities).length > 0;
      return false;
    }
    function renderStepsBar() {
      const defs = [
        { n: 1, label: 'Month Setup' },
        { n: 2, label: 'Weekly Events' },
        { n: 3, label: 'Team & Report' },
        { n: 4, label: 'Roster' },
        { n: 5, label: 'Performance' },
        { n: 6, label: 'Spiritual' },
        { n: 7, label: 'Generate' }
      ];
      return defs.map(s => {
        const cls = s.n < state.step ? 'done' : s.n === state.step ? 'active' : '';
        const inner = s.n < state.step ? '&#10003;' : s.n;
        const dotFilled = s.n < state.step || stepHasData(s.n) ? 'filled' : '';
        return `<div class="step-tab ${cls}">
      <div class="step-num">${inner}</div>
      <div style="font-size:10px; margin-top:2px;">${s.label}</div>
      <div class="step-dot ${dotFilled}"></div>
    </div>`;
      }).join('');
    }

    // ══════════════════════════════════════════
    // STEP 1
    // ══════════════════════════════════════════
    function renderStep1() {
      let yearOpts = '';
      for (let y = state.year - 1; y <= state.year + 2; y++)
        yearOpts += `<option value="${y}" ${y === state.year ? 'selected' : ''}>${y}</option>`;

      const monthOpts = MONTHS.map((m, i) =>
        `<option value="${i}" ${i === state.month ? 'selected' : ''}>${m}</option>`).join('');

      return `
  <div class="card">
    <div class="card-header">
      <div class="card-icon">📅</div>
      <div><h2>Month Setup</h2><div class="card-subtitle">Select the month you're preparing</div></div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="field-label">Month</label>
        <select onchange="state.month=parseInt(this.value)">${monthOpts}</select>
      </div>
      <div class="form-group">
        <label class="field-label">Year</label>
        <select onchange="state.year=parseInt(this.value)">${yearOpts}</select>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-icon">⛽</div>
      <div><h2>Fuel Prices</h2><div class="card-subtitle">Update if prices have changed</div></div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="field-label">Diesel (₦ / litre)</label>
        <input type="number" value="${state.dieselPrice}" onchange="state.dieselPrice=parseFloat(this.value)||1000">
      </div>
      <div class="form-group">
        <label class="field-label">Petrol (₦ / litre)</label>
        <input type="number" value="${state.petrolPrice}" onchange="state.petrolPrice=parseFloat(this.value)||845">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-icon">🎵</div>
      <div><h2>Default Rehearsal Day</h2><div class="card-subtitle">You can override per week in the next step</div></div>
    </div>
    <div class="radio-group">
      ${[{ v: 4, l: 'Thursday' }, { v: 5, l: 'Friday' }, { v: 6, l: 'Saturday' }].map(d => `
        <div class="radio-option">
          <input type="radio" name="rehDay" id="rd${d.v}" value="${d.v}" ${state.defaultRehDay === d.v ? 'checked' : ''} onchange="state.defaultRehDay=parseInt(this.value); renderCurrent()">
          <label for="rd${d.v}">${d.l}</label>
        </div>
      `).join('')}
    </div>
  </div>

  <div class="nav-row">
    <div></div>
    <button class="btn btn-navy" onclick="goStep2()">Next: Weekly Events →</button>
  </div>`;
    }

    // ══════════════════════════════════════════
    // STEP 2
    // ══════════════════════════════════════════
    function renderStep2() {
      computeWeeks();
      const hasWarning = state.weeks.some(w =>
        w.wednesday.getMonth() !== state.month || w.rehDate.getMonth() !== state.month);

      const weeksHtml = state.weeks.map((wk, wi) => {
        const rehDay = wk.rehDayOverride ?? state.defaultRehDay;
        const wedWarn = wk.wednesday.getMonth() !== state.month ? ' ⚠️' : '';
        const rehWarn = wk.rehDate.getMonth() !== state.month ? ' ⚠️' : '';

        const specialsHtml = wk.specials.map((ev, ei) => `
      <div class="special-event-row">
        <div class="form-group">
          <label class="field-label" style="font-size:10px">Event name</label>
          <input type="text" value="${ev.name}" placeholder="e.g. Family Meeting"
            onchange="state.weeks[${wi}].specials[${ei}].name=this.value;saveState()">
        </div>
        <div class="form-group">
          <label class="field-label" style="font-size:10px">Date</label>
          <input type="date" value="${ev.date}"
            onchange="state.weeks[${wi}].specials[${ei}].date=this.value;saveState()">
        </div>
        <div class="form-group">
          <label class="field-label" style="font-size:10px">Hours</label>
          <input type="number" step="0.5" min="0.5" value="${ev.hours || 3}"
            onchange="state.weeks[${wi}].specials[${ei}].hours=parseFloat(this.value)||3;saveState()">
        </div>
        <div class="form-group">
          <label class="field-label" style="font-size:10px">Fuel</label>
          <select onchange="state.weeks[${wi}].specials[${ei}].fuelType=this.value;state.weeks[${wi}].specials[${ei}].litresPerHour=this.value==='diesel'?12:2.5;saveState()">
            <option value="petrol"${(ev.fuelType || 'petrol') === 'petrol' ? ' selected' : ''}>Petrol</option>
            <option value="diesel"${ev.fuelType === 'diesel' ? ' selected' : ''}>Diesel</option>
          </select>
        </div>
        <div class="form-group">
          <label class="field-label" style="font-size:10px">L/Hr</label>
          <input type="number" step="0.5" min="0.5" value="${ev.litresPerHour || 2.5}"
            onchange="state.weeks[${wi}].specials[${ei}].litresPerHour=parseFloat(this.value)||2.5;saveState()">
        </div>
        <button class="btn btn-icon" onclick="rmSpecial(${wi},${ei})" style="align-self:flex-end">✕</button>
      </div>
    `).join('');

        return `
    <div class="week-card">
      <div class="week-card-head">
        <span class="week-label">Week ${wi + 1}</span>
        <span class="week-range">${MONTHS[state.month]} ${state.year}</span>
      </div>
      <div class="week-body">
        <div class="event-row">
          <div class="event-dot dot-diesel"></div>
          <div class="event-name">Midweek Service</div>
          <div class="event-date-text">${fmtDisplay(wk.wednesday)}${wedWarn}</div>
          <span class="event-badge badge-d">DIESEL</span>
        </div>
        <div class="event-row">
          <div class="event-dot dot-diesel"></div>
          <div class="event-name">Sunday Service</div>
          <div class="event-date-text">${fmtDisplay(wk.sunday)}</div>
          <span class="event-badge badge-d">DIESEL</span>
        </div>
        <div class="event-row">
          <div class="event-dot dot-petrol"></div>
          <div class="event-name">Expression Rehearsal</div>
          <div class="event-date-text">${fmtDisplay(wk.rehDate)}${rehWarn}</div>
          <span class="event-badge badge-p">PETROL</span>
          <div class="rehearsal-override">
            <select onchange="overrideReh(${wi},this.value)" style="width:auto;padding:4px 8px;font-size:11px;border-radius:6px;">
              <option value="">Default (${DAYS[state.defaultRehDay]})</option>
              ${[4, 5, 6].filter(d => d !== state.defaultRehDay).map(d =>
          `<option value="${d}" ${wk.rehDayOverride === d ? 'selected' : ''}>${DAYS[d]}</option>`
        ).join('')}
            </select>
          </div>
        </div>

        ${wk.specials.length > 0 ? `
          <div class="special-events-area">
            <div class="special-events-title">Special events</div>
            ${specialsHtml}
          </div>
        ` : ''}

        <button class="btn btn-ghost-add" style="margin-top:8px;" onclick="addSpecial(${wi})">
          + Add special event to Week ${wi + 1}
        </button>
      </div>
    </div>`;
      }).join('');

      return `
  ${hasWarning ? `<div class="alert alert-warn">⚠️ Some dates fall outside ${MONTHS[state.month]}. This is normal for the first/last week. They'll still be included in your budget.</div>` : ''}

  <div class="card">
    <div class="card-header">
      <div class="card-icon">📋</div>
      <div>
        <h2>Weekly Events — ${MONTHS[state.month]} ${state.year}</h2>
        <div class="card-subtitle">Dates are auto-calculated. Override rehearsal day or add special events as needed.</div>
      </div>
    </div>
    ${weeksHtml}
  </div>

  <div class="nav-row">
    <button class="btn btn-outline" onclick="goStep(1)">← Back</button>
    <button class="btn btn-navy" onclick="goStep(3)">Next: Report Details →</button>
  </div>`;
    }

    // ══════════════════════════════════════════
    // STEP 3
    // ══════════════════════════════════════════
    function renderStep3() {
      const teamHtml = state.teamMembers.map((m, i) => `
    <div class="list-item">
      <span class="list-num">${i + 1}</span>
      <input type="text" value="${m}" placeholder="Member Name (e.g. John Adeyemi)"
        onchange="state.teamMembers[${i}]=this.value;saveState()">
      <button class="btn btn-icon" onclick="rmItem('teamMembers',${i})">✕</button>
    </div>`).join('');

      const goalsHtml = state.goals.map((g, i) => `
    <div class="list-item">
      <span class="list-num">${i + 1}</span>
      <input type="text" value="${g}" placeholder="Dept. Goal (e.g. Listen to weekly messages)"
        onchange="state.goals[${i}]=this.value;saveState()">
      <button class="btn btn-icon" onclick="rmItem('goals',${i})">✕</button>
    </div>`).join('');

      return `
  <div class="card">
    <div class="card-header">
      <div class="card-icon">👥</div>
      <div><h2>Team Members</h2><div class="card-subtitle">Current serving members of the Circuit dept.</div></div>
    </div>
    <div style="margin-bottom:12px">${teamHtml}</div>
    <button class="btn btn-ghost-add" onclick="addItem('teamMembers')">+ Add team member</button>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-icon">🎯</div>
      <div><h2>Departmental Goals — ${MONTHS[state.month]}</h2><div class="card-subtitle">Goals set for this month</div></div>
    </div>
    <div style="margin-bottom:12px">${goalsHtml}</div>
    <button class="btn btn-ghost-add" onclick="addItem('goals')">+ Add goal</button>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-icon">📱</div>
      <div><h2>WhatsApp Integration</h2><div class="card-subtitle">Group link for sharing service updates and check-ins</div></div>
    </div>
    <div class="form-group">
      <label class="field-label">WhatsApp Group Link / Number</label>
      <input type="text" value="${state.whatsappGroup || ''}" placeholder="e.g. https://chat.whatsapp.com/..." 
        onchange="state.whatsappGroup=this.value;saveState()">
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-icon">💰</div>
      <div><h2>Financial Figures</h2><div class="card-subtitle">End-of-month account balances</div></div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="field-label">Departmental Seed Account (₦)</label>
        <input type="text" value="${state.seedBalance}" placeholder="e.g. 45,000"
          onchange="state.seedBalance=this.value">
      </div>
      <div class="form-group">
        <label class="field-label">Budget &amp; Expense Account (₦)</label>
        <input type="text" value="${state.budgetBalance}" placeholder="e.g. 120,000"
          onchange="state.budgetBalance=this.value">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-icon">📝</div>
      <div><h2>Special Activities / Notes</h2><div class="card-subtitle">Notable events or achievements this month</div></div>
    </div>
    <textarea placeholder="e.g. The department successfully coordinated sound for the Anniversary Sunday..." onchange="state.specialActivities=this.value">${state.specialActivities}</textarea>
  </div>

  <div class="nav-row">
    <button class="btn btn-outline" onclick="goStep(2)">← Back</button>
    <button class="btn btn-navy" onclick="goStep(4)">Next: Roster →</button>
  </div>`;
    }

    // ══════════════════════════════════════════
    // STEP 4 — ROSTER & ASSIGNMENTS
    // ══════════════════════════════════════════
    function renderStep4() {
      const members = getActiveMembers();
      const mo = `${MONTHS[state.month]} ${state.year} `;
      const memberOpts = (sel) => `< option value = "" >— Assign —</option > ` +
        members.map(m => `< option value = "${m}"${m === sel ? ' selected' : ''}> ${m}</option > `).join('');
      const rolesHtml = state.roles.map((r, ri) => `< tr >
        <td><span class="role-badge">${r.code}</span></td>
        <td><input type="text" value="${r.name}" style="padding:5px 8px;font-size:12px" onchange="state.roles[${ri}].name=this.value;saveState()"></td>
        <td><select onchange="state.roles[${ri}].primary=this.value;saveState()">${memberOpts(r.primary)}</select></td>
        <td><select onchange="state.roles[${ri}].alt1=this.value;saveState()">${memberOpts(r.alt1)}</select></td>
        <td><select onchange="state.roles[${ri}].alt2=this.value;saveState()">${memberOpts(r.alt2)}</select></td>
      </tr > `).join('');
      const svcDates = getServiceDatesForRoster();
      const roleHdrs = state.roles.map(r => `< th > ${r.code}</th > `).join('');
      const assignHtml = svcDates.map(svc => {
        const dk = dateKey(svc.date);
        if (!state.serviceAssignments[dk]) state.serviceAssignments[dk] = {};
        const cols = state.roles.map((r, ri) => {
          const assigned = state.serviceAssignments[dk][r.code] || '';
          return `< td > <select style="font-size:11px;padding:4px 6px" onchange="state.serviceAssignments['${dk}']['${r.code}']=this.value;saveState()">${memberOpts(assigned)}</select></td > `;
        }).join('');
        return `< tr > <td style="white-space:nowrap;font-size:12px;font-weight:600">${svc.label}</td>${cols}</tr > `;
      }).join('');
      return `
        < div class="card" >
    <div class="card-header"><div class="card-icon">📋</div><div><h2>Role Definitions</h2><div class="card-subtitle">Set Primary and Alternates for each role</div></div></div>
    <div style="overflow-x:auto"><table class="roster-grid">
      <thead><tr><th>Code</th><th>Role Name</th><th>Primary</th><th>Alternate 1</th><th>Alternate 2</th></tr></thead>
      <tbody>${rolesHtml}</tbody>
    </table></div>
  </div >
  <div class="card">
    <div class="card-header"><div class="card-icon">🗓️</div><div><h2>Service Assignments — ${mo}</h2><div class="card-subtitle">Who fills each role per service date</div></div></div>
    ${svcDates.length === 0 ? '<div class="alert alert-info">Complete Step 2 (Weekly Events) first to see service dates here.</div>' : ''}
    <div style="overflow-x:auto"><table class="roster-grid">
      <thead><tr><th>Service Date</th>${roleHdrs}</tr></thead>
      <tbody>${assignHtml}</tbody>
    </table></div>
  </div>
  <div class="nav-row"><button class="btn btn-outline" onclick="goStep(3)">← Back</button><button class="btn btn-navy" onclick="goStep(5)">Next: Performance →</button></div>`;
    }

    // ══════════════════════════════════════════
    // STEP 5 — SERVICE PERFORMANCE TRACKER
    // ══════════════════════════════════════════
    function renderStep5() {
      const members = getActiveMembers();
      const svcDates = getServiceDatesForRoster();
      if (members.length === 0) return `< div class="card" > <div class="alert alert-warn">Add team members in Step 3 first.</div></div > <div class="nav-row"><button class="btn btn-outline" onclick="goStep(4)">← Back</button></div>`;
      members.forEach(m => {
        if (!state.servicePerformance[m]) state.servicePerformance[m] = {};
        svcDates.forEach(svc => {
          const dk = dateKey(svc.date);
          if (!state.servicePerformance[m][dk]) state.servicePerformance[m][dk] = { onTime: '', dressCode: '', attended: '', tasksDone: '', verified: '' };
        });
      });
      const yn = (m, dk, f) => { const v = state.servicePerformance[m]?.[dk]?.[f] || ''; return `< select style = "width:50px;font-size:11px;padding:2px 3px" onchange = "setPerf('${m.replace(/'/g, "\\'")}', '${dk}', '${f}', this.value) "><option value=""${v === '' ? ' selected' : ''}>—</option><option value="Y"${v === 'Y' ? ' selected' : ''}>Y</option><option value="N"${v === 'N' ? ' selected' : ''}>N</option></select>`; };
      const amns = (m, dk, f) => { const v = state.servicePerformance[m]?.[dk]?.[f] || ''; return `<select style="width:58px;font-size:11px;padding:2px 3px" onchange="setPerf('${m.replace(/'/g, "\\'")}','${dk}','${f}',this.value)"><option value=""${v === '' ? ' selected' : ''}>—</option><option value="All"${v === 'All' ? ' selected' : ''}>All</option><option value="Most"${v === 'Most' ? ' selected' : ''}>Most</option><option value="Some"${v === 'Some' ? ' selected' : ''}>Some</option><option value="None"${v === 'None' ? ' selected' : ''}>None</option></select>`; };
      const dateHeaders = svcDates.map(s => `<th colspan="5" style="border-left:2px solid rgba(255,255,255,.3)">${fmtDisplay(s.date)}<span class="date-hdr-sub">${s.label.split('—')[0].trim()}</span></th>`).join('');
      const subHeaders = svcDates.map(() => `<th>Time</th><th>Dress</th><th>Attend</th><th>Tasks</th><th>Verified</th>`).join('');
      const rows = members.map(m => {
        const score = calcMemberScore(m, svcDates);
        const cls = score >= 80 ? 'sc-a' : score >= 60 ? 'sc-b' : 'sc-c';
        const cells = svcDates.map(s => { const dk = dateKey(s.date); return `<td style="border-left:2px solid #e5e7eb">${yn(m, dk, 'onTime')}</td><td>${yn(m, dk, 'dressCode')}</td><td>${yn(m, dk, 'attended')}</td><td>${amns(m, dk, 'tasksDone')}</td><td>${amns(m, dk, 'verified')}</td>`; }).join('');
        return `<tr><td class="name-col">${m}<br><span class="${cls}" style="font-size:11px;font-weight:700">${score}%</span></td>${cells}</tr>`;
      }).join('');
      const scoreCards = members.map(m => { const s = calcMemberScore(m, svcDates); const cls = s >= 80 ? 'sc-a' : s >= 60 ? 'sc-b' : 'sc-c'; return `<div class="score-card"><div class="sc-name">${m.split(' ')[0]}</div><div class="sc-score ${cls}">${s}%</div><div class="sc-label">Performance</div></div>`; }).join('');
      return `
  <div class="card">
    <div class="card-header"><div class="card-icon">📊</div><div><h2>Steward Performance — ${MONTHS[state.month]} ${state.year}</h2><div class="card-subtitle">Mark Y/N for each metric. Scores auto-calculate.</div></div></div>
    <div class="score-cards">${scoreCards}</div>
    ${svcDates.length === 0 ? '<div class="alert alert-info">Complete Step 2 first to see service dates here.</div>' : ''}
    <div class="perf-table-wrap"><table class="perf-table">
      <thead><tr><th class="name-col" rowspan="2">Steward</th>${dateHeaders}</tr><tr>${subHeaders}</tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </div>
  <div class="nav-row"><button class="btn btn-outline" onclick="goStep(4)">← Back</button><button class="btn btn-navy" onclick="goStep(6)">Next: Spiritual Activities →</button></div>`;
    }

    // ══════════════════════════════════════════
    // STEP 6 — SPIRITUAL ACTIVITIES
    // ══════════════════════════════════════════
    function renderStep6() {
      const members = getActiveMembers();
      const nw = state.weeks.length || 5;
      members.forEach(m => { if (!state.spiritualActivities[m]) state.spiritualActivities[m] = { friday: Array(5).fill(''), saturday: Array(5).fill('') }; });
      const weekHdrs = Array.from({ length: nw }, (_, i) => `<th>Wk ${i + 1}</th>`).join('');
      const makeRows = (act) => members.map(m => {
        const data = state.spiritualActivities[m]?.[act] || Array(5).fill('');
        const total = data.filter(v => v === 'Y').length;
        const cells = Array.from({ length: nw }, (_, wi) => { const v = data[wi] || ''; return `<td><select style="width:48px;font-size:11px;padding:2px 3px" onchange="setSpiritActivity('${m.replace(/'/g, "\\'")}','${act}',${wi},this.value)"><option value=""${v === '' ? ' selected' : ''}>—</option><option value="Y"${v === 'Y' ? ' selected' : ''}>Y</option><option value="N"${v === 'N' ? ' selected' : ''}>N</option></select></td>`; }).join('');
        return `<tr><td class="name-col">${m}</td>${cells}<td class="total-col">${total}/${nw}</td></tr>`;
      }).join('');
      const tHead = `<thead><tr><th style="text-align:left;min-width:130px">Steward Name</th>${weekHdrs}<th>Total</th></tr></thead>`;
      return `
  <div class="card">
    <div class="card-header"><div class="card-icon">🙏</div><div><h2>Spiritual Activities Log — ${MONTHS[state.month]} ${state.year}</h2><div class="card-subtitle">Track Friday meeting and Saturday prayer attendance by week</div></div></div>
    <div class="spirit-section-head">FRIDAY DEPARTMENTAL MEETINGS</div>
    <div style="overflow-x:auto"><table class="spirit-table">${tHead}<tbody>${makeRows('friday')}</tbody></table></div>
    <div class="spirit-section-head">SATURDAY ONLINE PRAYER (9–10PM)</div>
    <div style="overflow-x:auto"><table class="spirit-table">${tHead}<tbody>${makeRows('saturday')}</tbody></table></div>
  </div>
  <div class="nav-row"><button class="btn btn-outline" onclick="goStep(5)">← Back</button><button class="btn btn-navy" onclick="goStep(7)">Next: Generate →</button></div>`;
    }

    // ══════════════════════════════════════════
    // STEP 7 — GENERATE
    // ══════════════════════════════════════════
    function renderStep7() {
      const totalSpecials = state.weeks.reduce((a, w) => a + w.specials.length, 0);
      const D = state.dieselPrice, P = state.petrolPrice;
      const rehCPH = ceil10(2.5 * P);
      let grandTotal = 0;
      const weekCosts = state.weeks.map((wk, i) => {
        let dieselAmt = 12 * D * 2.5 + 12 * D * 4;
        let petrolAmt = rehCPH * 3;
        wk.specials.forEach(ev => {
          const lph = ev.litresPerHour || 2.5, ft = ev.fuelType || 'petrol';
          const cost = ceil10(lph * (ft === 'diesel' ? D : P)) * (ev.hours || 3);
          if (ft === 'diesel') dieselAmt += cost; else petrolAmt += cost;
        });
        const sub = dieselAmt + petrolAmt;
        grandTotal += sub;
        return { i, dieselAmt, petrolAmt, sub };
      });
      const members = getActiveMembers();
      const svcDates = getServiceDatesForRoster();
      const scoreCards = members.length > 0 ? `<div class="score-cards">${members.map(m => { const s = calcMemberScore(m, svcDates); const cls = s >= 80 ? 'sc-a' : s >= 60 ? 'sc-b' : 'sc-c'; return `<div class="score-card"><div class="sc-name">${m.split(' ')[0]}</div><div class="sc-score ${cls}">${s}%</div><div class="sc-label">Performance</div></div>`; }).join('')}</div>` : '';
      const tableRows = state.weeks.map((wk, i) => {
        const sp = wk.specials.filter(e => e.name).map(e => `<span class="tag tag-sp">${e.name}</span>`).join('');
        return `<tr><td><strong>Week ${i + 1}</strong></td><td>${fmtDisplay(wk.wednesday)}</td><td>${fmtDisplay(wk.sunday)}</td><td>${fmtDisplay(wk.rehDate)}</td><td>${sp || '\u2014'}</td></tr>`;
      }).join('');
      const costBreakdownRows = weekCosts.map(wc => `
        <div class="week-cost-row">
          <span style="font-weight:700;min-width:64px">Week ${wc.i + 1}</span>
          <span class="week-cost-label"><span class="tag tag-d" style="margin-right:4px">D</span>\u20a6${wc.dieselAmt.toLocaleString()}</span>
          <span class="week-cost-label"><span class="tag tag-p" style="margin-right:4px">P</span>\u20a6${wc.petrolAmt.toLocaleString()}</span>
          <span class="week-cost-amt">\u20a6${wc.sub.toLocaleString()}</span>
        </div>`).join('');
      const mo = MONTHS[state.month], yr = state.year;
      return `
  <div class="save-note"><strong>&#128190; Save to OneDrive after downloading:</strong> OneDrive &#8594; NRCC Circuit &#8594; ${yr} &#8594; ${mo} &#8594; paste the downloaded files here.</div>
  <div class="gen-hero">
    <div class="month-chip">${mo.toUpperCase()} ${yr}</div>
    <h2>Ready to generate your files</h2>
    <div class="gen-sub">${state.weeks.length} service weeks &middot; ${totalSpecials} special event${totalSpecials !== 1 ? 's' : ''} &middot; Est. total: &#8358;${grandTotal.toLocaleString()}</div>
    <div class="gen-btns">
      <button class="btn btn-gen-excel" onclick="generateExcel()">&#128202; Download Budget (Excel)</button>
      <button class="btn btn-gen-word" onclick="generateWord()">&#128196; Download Report (Word)</button>
    </div>
  </div>
  ${members.length > 0 ? `<div class="card"><div class="card-header"><div class="card-icon">&#128202;</div><div><h2>Performance Summary</h2></div></div>${scoreCards}</div>` : ''}
  <div class="card">
    <div class="card-header"><div class="card-icon">&#128176;</div><div><h2>Weekly Cost Breakdown</h2><div class="card-subtitle">Diesel + Petrol split per week</div></div></div>
    ${costBreakdownRows}
    <div class="week-cost-row" style="border-top:2px solid var(--border);margin-top:8px;padding-top:10px;font-size:14px">
      <span style="font-weight:700">GRAND TOTAL</span>
      <span class="week-cost-label"></span>
      <span class="week-cost-label"></span>
      <span class="week-cost-amt" style="font-size:16px;color:var(--gold)">&#8358;${grandTotal.toLocaleString()}</span>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><div class="card-icon">&#128203;</div><div><h2>Events Summary</h2></div></div>
    <table class="summary-table">
