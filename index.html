          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <div class="log-card-title" style="margin:0">${svc.label}</div>
            ${isLocked ? '<span style="font-size:10px;color:var(--danger);font-weight:700;text-transform:uppercase">🔒 Locked</span>' : ''}
          </div>
          ${memberEntries}
        </div>`;
      }).join('');

      document.getElementById('drawerBody').innerHTML = `
        <div style="font-size:12px;color:var(--text-light);margin-bottom:14px;font-weight:600;text-transform:uppercase;letter-spacing:.06em">
          Member Attendance — ${mo} ${yr}
        </div>
        ${logsHtml}`;
    }
    function saveAttendance(dk, name, field, val) {
      if (!state.memberAttendance[dk]) state.memberAttendance[dk] = { locked: false, entries: {} };
      if (!state.memberAttendance[dk].entries[name]) state.memberAttendance[dk].entries[name] = { present: false, arrivalTime: '' };
      state.memberAttendance[dk].entries[name][field] = val;

      // Auto-sync to performance state
      if (field === 'arrivalTime' && val) {
        if (!state.servicePerformance[name]) state.servicePerformance[name] = {};
        if (!state.servicePerformance[name][dk]) state.servicePerformance[name][dk] = {};

        // Auto-mark present if time is entered
        if (!state.memberAttendance[dk].entries[name].present) {
          state.memberAttendance[dk].entries[name].present = true;
          state.servicePerformance[name][dk].attended = 'Y';
        }

        // Specific Timing Logic
        const [h, m] = val.split(':').map(Number);
        const mins = h * 60 + (m || 0);
        const isSun = dk.includes('Sun');
        const isMid = dk.includes('Mid-Week') || dk.includes('Midweek');

        if (isSun) {
          if (mins <= 7 * 60 + 10) state.servicePerformance[name][dk].onTime = 'Ideal';
          else if (mins <= 7 * 60 + 20) state.servicePerformance[name][dk].onTime = 'Y';
          else state.servicePerformance[name][dk].onTime = 'N';
        } else if (isMid) {
          if (mins <= 17 * 60) state.servicePerformance[name][dk].onTime = 'Ideal';
          else if (mins <= 17 * 60 + 30) state.servicePerformance[name][dk].onTime = 'Y';
          else state.servicePerformance[name][dk].onTime = 'N';
        } else {
          state.servicePerformance[name][dk].onTime = 'Y'; // Default for other events
        }
      }
      saveState();
      renderDrawer();
    }

    function shareAttendanceToWhatsApp(member, dateKey) {
      if (!state.whatsappGroup) { alert('Go to Step 3 to set your WhatsApp Group Link!'); goStep(3); return; }
      const att = (state.memberAttendance[dateKey]?.entries || {})[member] || {};
      if (!att.arrivalTime) { alert('Enter arrival time first.'); return; }

      const msg = `📋 *NRCC Check-in*%0A👤 *Member:* ${member}%0A📅 *Service:* ${dateKey}%0A⏰ *Arrival:* ${att.arrivalTime}%0A%0A_Sent via NRCC Generator v4.5_`;
      const url = state.whatsappGroup.startsWith('http') ?
        `${state.whatsappGroup}${state.whatsappGroup.includes('?') ? '&' : '?'}text=${msg}` :
        `https://wa.me/${state.whatsappGroup.replace(/\D/g, '')}?text=${msg}`;
      window.open(url, '_blank');
    }
    function togglePresent(dk, name) {
      if (!state.memberAttendance[dk]) state.memberAttendance[dk] = { locked: false, entries: {} };
      if (state.memberAttendance[dk].locked) return;
      if (!state.memberAttendance[dk].entries[name]) state.memberAttendance[dk].entries[name] = { present: false, arrivalTime: '' };
      const entry = state.memberAttendance[dk].entries[name];
      entry.present = !entry.present;

      if (!state.servicePerformance[name]) state.servicePerformance[name] = {};
      if (!state.servicePerformance[name][dk]) state.servicePerformance[name][dk] = {};
      state.servicePerformance[name][dk].attended = entry.present ? 'Y' : 'N';
      if (!entry.present) { entry.arrivalTime = ''; state.servicePerformance[name][dk].onTime = 'N'; }

      saveState();
      renderDrawer();
    }
    function toggleLock(dk) {
      if (!state.memberAttendance[dk]) state.memberAttendance[dk] = { locked: false, entries: {} };
      state.memberAttendance[dk].locked = !state.memberAttendance[dk].locked;
      saveState();
      showAdminSummary();
    }
    function saveLog(dk, field, val) {
      if (!state.serviceLog[dk]) state.serviceLog[dk] = { attendance: '', equipment: '', notes: '' };
      state.serviceLog[dk][field] = val;
      saveState();
    }

    // ══════════════════════════════════════════
    // BIO DATA FUNCTIONS
    // ══════════════════════════════════════════
    function openBioModal() {
      const modal = document.getElementById('bioModal');
      modal.style.display = 'flex';
      renderBioTable();
    }
    function closeBioModal() {
      document.getElementById('bioModal').style.display = 'none';
    }
    function renderBioTable() {
      const members = getActiveMembers();
      const tbody = document.getElementById('bioTableBody');
      tbody.innerHTML = members.map((m, i) => {
        let bio = state.bioData.find(b => b.name === m);
        if (!bio) { bio = { name: m, address: '', phone: '', email: '', cell: '', dob: '' }; state.bioData.push(bio); }
        return `<tr>
          <td style="font-weight:600">${m}</td>
          <td><input placeholder="Address..." value="${bio.address || ''}" oninput="setBio('${m}','address',this.value)"></td>
          <td><input placeholder="Phone..." value="${bio.phone || ''}" oninput="setBio('${m}','phone',this.value)"></td>
          <td><input placeholder="Email..." value="${bio.email || ''}" oninput="setBio('${m}','email',this.value)"></td>
          <td><input placeholder="Cell..." value="${bio.cell || ''}" oninput="setBio('${m}','cell',this.value)"></td>
          <td><input placeholder="DOB..." value="${bio.dob || ''}" oninput="setBio('${m}','dob',this.value)"></td>
        </tr>`;
      }).join('');
    }
    function setBio(name, field, val) {
      let bio = state.bioData.find(b => b.name === name);
      if (!bio) { bio = { name, address: '', phone: '', email: '', cell: '', dob: '' }; state.bioData.push(bio); }
      bio[field] = val;
      saveState();
    }
    function downloadBioData() {
      const members = getActiveMembers();
      const rows = members.map(m => {
        const b = state.bioData.find(x => x.name === m) || {};
        return { 'Name': m, 'Address': b.address || '', 'Contact No.': b.phone || '', 'Email': b.email || '', 'Cell Group': b.cell || '', 'Date of Birth': b.dob || '' };
      });
      const ws = XLSX.utils.json_to_sheet(rows);
      XLSX.utils.sheet_add_aoa(ws, [['NRCC CIRCUIT DEPARTMENT - PERSONNEL BIO DATA']], { origin: 'A1' });
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Bio Data');
      XLSX.writeFile(wb, `NRCC_Circuit_BioData_${state.year}.xlsx`);
    }
    function openAdminView() {
      document.getElementById('pinModal').style.display = 'flex';
      document.getElementById('pinInput').value = '';
      document.getElementById('pinError').textContent = '';
      setTimeout(() => document.getElementById('pinInput').focus(), 100);
    }
    function closePinModal() {
      document.getElementById('pinModal').style.display = 'none';
    }
    function checkPin() {
      const entered = document.getElementById('pinInput').value;
      if (!entered) return;
      if (entered === state.adminPin) {
        closePinModal();
        showAdminSummary();
      } else if (entered.length >= state.adminPin.length) {
        document.getElementById('pinError').textContent = 'Incorrect password. Try again.';
        document.getElementById('pinInput').value = '';
      }
    }
    function showAdminSummary() {
      const mo = MONTHS[state.month], yr = state.year;
      const svcDates = getServiceDatesForRoster();
      const members = getActiveMembers();
      const D = state.dieselPrice, P = state.petrolPrice, rehCPH = ceil10(2.5 * P);
      let grandTotal = 0;
      state.weeks.forEach(wk => {
        grandTotal += 12 * D * 2.5 + 12 * D * 4 + rehCPH * 3;
        wk.specials.forEach(ev => {
          const lph = ev.litresPerHour || 2.5, ft = ev.fuelType || 'petrol';
          grandTotal += ceil10(lph * (ft === 'diesel' ? D : P)) * (ev.hours || 3);
        });
      });
      const totalAtt = svcDates.reduce((s, svc) => s + (parseInt(state.serviceLog[dateKey(svc.date)]?.attendance) || 0), 0);
      const avgAtt = svcDates.length ? Math.round(totalAtt / svcDates.length) : 0;
      const issueCount = svcDates.filter(svc => (state.serviceLog[dateKey(svc.date)]?.equipment || '').trim()).length;
      const perfRows = members.map(m => {
        const sc = calcMemberScore(m, svcDates);
        const col = sc >= 80 ? 'sc-a' : sc >= 60 ? 'sc-b' : 'sc-c';
        return `<tr><td style="padding:6px 10px;border-bottom:1px solid var(--cream-dark)">${m}</td><td style="padding:6px 10px;border-bottom:1px solid var(--cream-dark);text-align:center"><span class="${col}" style="font-weight:700">${sc}%</span></td></tr>`;
      }).join('');
      const logRows = svcDates.map(svc => {
        const dk = dateKey(svc.date);
        const log = state.serviceLog[dk] || {};
        const att = state.memberAttendance[dk] || { locked: false, entries: {} };
        const isLocked = att.locked;
        const presentCount = Object.values(att.entries).filter(e => e.present).length;

        return `<div style="padding:10px;border-bottom:1px solid var(--cream-dark);display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:700;font-size:12px;color:var(--navy);margin-bottom:2px">${svc.label}</div>
            <div style="font-size:11px;color:var(--text-light)">Department Attendance: <strong>${presentCount}/${members.length}</strong></div>
            ${log.equipment ? `<div style="font-size:11px;color:#dc2626">⚠️ Equipment Issue Reported</div>` : ''}
          </div>
          <button onclick="toggleLock('${dk}')" 
            style="background:${isLocked ? '#fee2e2' : 'var(--cream)'};color:${isLocked ? '#dc2626' : 'var(--navy)'};border:1px solid ${isLocked ? '#fecaca' : 'var(--border)'};padding:6px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">
            ${isLocked ? '🔓 Unlock' : '🔒 Lock Day'}
          </button>
        </div>`;
      }).join('');
      document.getElementById('drawerBody').innerHTML = `
        <div style="background:var(--navy);color:#fff;border-radius:12px;padding:16px;margin-bottom:14px">
          <div style="font-size:11px;opacity:.6;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Admin Summary &mdash; ${mo} ${yr}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div style="text-align:center"><div style="font-size:20px;font-weight:700">&#8358;${grandTotal.toLocaleString()}</div><div style="font-size:10px;opacity:.7">Budget Total</div></div>
            <div style="text-align:center"><div style="font-size:20px;font-weight:700">${issueCount}</div><div style="font-size:10px;opacity:.7">Equipment Issues</div></div>
          </div>
        </div>
        ${members.length > 0 ? `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-light);margin-bottom:8px">Steward Performance (Avg)</div>
        <table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px"><tbody>${perfRows}</tbody></table>` : ''}
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-light);margin-bottom:8px">Service Controls</div>
        <div style="background:var(--cream);border-radius:10px;overflow:hidden;margin-bottom:14px">${logRows || '<div style="padding:12px;font-size:12px;color:var(--text-light);text-align:center">No service dates yet</div>'}</div>
        
        <div style="background:#fff;border:1.5px dashed var(--border);border-radius:12px;padding:14px;margin-bottom:14px">
          <div style="font-size:11px;font-weight:700;color:var(--navy);margin-bottom:6px;text-transform:uppercase">📲 WhatsApp Batch Import</div>
          <div style="font-size:10px;color:var(--text-light);margin-bottom:8px">Paste check-in messages from the group chat here to sync them instantly.</div>
          <textarea id="batchInput" placeholder="Paste messages here..." style="width:100%;height:60px;font-size:11px;padding:8px;border-radius:6px;border:1px solid #ddd;margin-bottom:8px;font-family:monospace"></textarea>
          <button onclick="batchImportAttendance()" style="width:100%;background:var(--gold);color:var(--navy);border:none;padding:8px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">Update Log from Text</button>
        </div>

        <div style="display:flex;gap:8px">
          <button onclick="renderDrawer()" style="flex:1;background:var(--navy);color:#fff;border:none;padding:10px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">&#8592; Back to Log</button>
          <button onclick="changePin()" style="flex:1;background:var(--cream);color:var(--text);border:1.5px solid var(--border);padding:10px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">&#128273; Change PIN</button>
        </div>`;
    }

    function batchImportAttendance() {
      const text = document.getElementById('batchInput').value;
      if (!text) return;

      const lines = text.split('\n');
      let member = '', date = '', time = '';
      let count = 0;

      // Extract details from formatted messages
      text.split('📋 *NRCC Check-in*').forEach(block => {
        if (!block.trim()) return;
        const mMatch = block.match(/Member:\s*([^\n\*]+)/i);
        const dMatch = block.match(/Service:\s*([^\n\*]+)/i);
        const tMatch = block.match(/Arrival:\s*([\d:]+)/i);

        if (mMatch && dMatch && tMatch) {
          const mName = mMatch[1].trim();
          const dKey = dMatch[1].trim();
          const aTime = tMatch[1].trim();

          // Match the date key exactly or by label
          const svcDates = getServiceDatesForRoster();
          const targetSvc = svcDates.find(s => s.label.includes(dKey) || dKey.includes(s.label));

          if (targetSvc) {
            const dk = dateKey(targetSvc.date);
            saveAttendance(dk, mName, 'arrivalTime', aTime);
            count++;
          }
        }
      });

      if (count > 0) {
        showToast(`Imported ${count} check-ins \u2713`);
        document.getElementById('batchInput').value = '';
        showAdminSummary();
      } else {
        alert('Could not find any valid check-in messages in the text.');
      }
    }
    function changePin() {
      const np = prompt('Enter new 4-digit PIN:');
      if (!np) return;
      if (!/^\d{4}$/.test(np)) { alert('PIN must be exactly 4 digits'); return; }
      state.adminPin = np;
      saveState();
      showToast('PIN updated \u2713');
    }

    // ══════════════════════════════════════════
    // MAIN RENDER
    // ══════════════════════════════════════════
    function renderCurrent() {
      document.getElementById('stepsBar').innerHTML = renderStepsBar();
      let html = '';
      if (state.step === 1) html = renderStep1();
      else if (state.step === 2) html = renderStep2();
      else if (state.step === 3) html = renderStep3();
      else if (state.step === 4) html = renderStep4();
      else if (state.step === 5) html = renderStep5();
      else if (state.step === 6) html = renderStep6();
      else if (state.step === 7) html = renderStep7();
      document.getElementById('content').innerHTML = html;
    }

    renderCurrent();
  </script>
</body>

</html>
