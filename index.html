<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NRCC Circuit V2</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-deep: #060d1f;
            --bg-card: rgba(255, 255, 255, 0.06);
            --bg-card-solid: #0f1a2e;
            --bg-glass: rgba(255, 255, 255, 0.08);
            --bg-glass-hover: rgba(255, 255, 255, 0.12);
            --gold: #d4a843;
            --gold-light: #f0d078;
            --gold-glow: rgba(212, 168, 67, 0.25);
            --accent-green: #34d399;
            --accent-red: #f87171;
            --accent-blue: #60a5fa;
            --accent-purple: #a78bfa;
            --text: #e8eaf0;
            --text-dim: rgba(255, 255, 255, 0.55);
            --text-muted: rgba(255, 255, 255, 0.35);
            --border: rgba(255, 255, 255, 0.08);
            --border-gold: rgba(212, 168, 67, 0.3);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --shadow-gold: 0 4px 20px rgba(212, 168, 67, 0.15);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 6px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 20% 50%, rgba(212, 168, 67, 0.06) 0%, transparent 50%), radial-gradient(ellipse at 80% 20%, rgba(96, 165, 250, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── GLOBAL HEADER ── */
        .g-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(6, 13, 31, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .g-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .g-logo {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--gold), #b8860b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: var(--shadow-gold);
        }

        .g-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        .g-subtitle {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sync-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent-red);
            display: inline-block;
        }

        .sync-dot.active {
            background: var(--accent-green);
            box-shadow: 0 0 8px rgba(52, 211, 153, 0.5);
        }

        @keyframes pulse {
            0% {
                opacity: 1
            }

            50% {
                opacity: .4
            }

            100% {
                opacity: 1
            }
        }

        .sync-syncing {
            animation: pulse 1s infinite;
        }

        .g-header-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .g-btn {
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--bg-glass);
            color: var(--text);
            transition: var(--transition);
            white-space: nowrap;
        }

        .g-btn:hover {
            background: var(--bg-glass-hover);
            transform: translateY(-1px);
        }

        .g-btn-gold {
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: #0a0f1e;
            border: none;
            font-weight: 700;
        }

        .g-btn-gold:hover {
            box-shadow: var(--shadow-gold);
        }

        /* ── GLASS CARDS ── */
        .glass {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 16px;
            transition: var(--transition);
        }

        .glass:hover {
            border-color: rgba(255, 255, 255, 0.12);
        }

        .glass-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .glass-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .glass-icon-navy {
            background: linear-gradient(135deg, #1a2a4a, #243e7a);
        }

        .glass-icon-gold {
            background: linear-gradient(135deg, var(--gold), #b8860b);
        }

        .glass-icon-green {
            background: linear-gradient(135deg, #065f46, #059669);
        }

        .glass h2 {
            font-family: 'Playfair Display', serif;
            font-size: 17px;
            color: #fff;
        }

        .glass .subtitle {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        /* ── LAYOUT ── */
        .app-layout {
            display: flex;
            min-height: calc(100vh - 60px);
            position: relative;
            z-index: 1;
        }

        .sidebar {
            width: 220px;
            background: rgba(6, 13, 31, 0.6);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border);
            padding: 20px 12px;
            flex-shrink: 0;
            position: sticky;
            top: 60px;
            height: calc(100vh - 60px);
            overflow-y: auto;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            color: var(--text-dim);
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 4px;
            border: 1px solid transparent;
        }

        .sidebar-item:hover {
            background: var(--bg-glass);
            color: var(--text);
        }

        .sidebar-item.active {
            background: var(--bg-glass-hover);
            color: var(--gold);
            border-color: var(--border-gold);
            font-weight: 600;
        }

        .sidebar-item .si-icon {
            font-size: 16px;
            width: 20px;
            text-align: center;
        }

        .sidebar-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            padding: 16px 14px 8px;
            font-weight: 700;
        }

        .main-content {
            flex: 1;
            padding: 28px 32px 60px;
            max-width: 900px;
        }

        /* ── PUBLIC HUB ── */
        .pub-hero {
            background: linear-gradient(135deg, #0f1a2e 0%, #1a2a4a 50%, #0f1a2e 100%);
            border-radius: var(--radius);
            padding: 48px 32px;
            text-align: center;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .pub-hero::before {
            content: '✝';
            position: absolute;
            font-size: 200px;
            color: rgba(212, 168, 67, 0.04);
            top: -20px;
            right: -20px;
            font-family: serif;
        }

        .pub-hero .month-chip {
            display: inline-block;
            background: var(--gold);
            color: #0a0f1e;
            font-weight: 700;
            font-size: 11px;
            padding: 5px 16px;
            border-radius: 20px;
            letter-spacing: 0.06em;
            margin-bottom: 16px;
        }

        .pub-hero h2 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: #fff;
            margin-bottom: 8px;
        }

        .pub-hero .pub-sub {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 28px;
        }

        .pub-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .pub-stat {
            background: var(--bg-glass);
            border-radius: var(--radius-sm);
            padding: 16px 12px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .pub-stat .val {
            font-size: 24px;
            font-weight: 800;
            color: var(--gold);
        }

        .pub-stat .lbl {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-top: 4px;
        }

        .pub-services {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .pub-svc-card {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 20px;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
        }

        .pub-svc-card:hover {
            background: var(--bg-glass-hover);
            border-color: var(--gold);
            transform: translateY(-2px);
        }

        .pub-svc-card .svc-emoji {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .pub-svc-card .svc-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .pub-svc-card .svc-date {
            font-size: 11px;
            color: var(--text-dim);
        }

        /* ── KPI CARDS ── */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .kpi {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
            transition: var(--transition);
        }

        .kpi:hover {
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .kpi .kpi-val {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .kpi .kpi-lbl {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 6px;
        }

        .kpi .kpi-sub {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* ── FORMS ── */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .form-row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group.full {
            grid-column: 1/-1;
        }

        label.field-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        input[type="text"],
        input[type="number"],
        input[type="time"],
        textarea {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            color: var(--text);
            background: rgba(255, 255, 255, 0.07);
            width: 100%;
            transition: var(--transition);
        }

        select {
            padding: 10px 14px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            color: #e8eaf0;
            background: #1a2540;
            width: 100%;
            transition: var(--transition);
            cursor: pointer;
        }

        select option {
            background: #1a2540;
            color: #e8eaf0;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px var(--gold-glow);
            background: rgba(255, 255, 255, 0.05);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        ::placeholder {
            color: var(--text-muted);
        }

        /* ── RADIO OPTIONS ── */
        .radio-group {
            display: flex;
            gap: 8px;
        }

        .radio-option {
            flex: 1;
            position: relative;
        }

        .radio-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
        }

        .radio-option label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 8px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dim);
            background: var(--bg-glass);
            transition: var(--transition);
            user-select: none;
        }

        .radio-option input:checked+label {
            border-color: var(--gold);
            background: rgba(212, 168, 67, 0.15);
            color: var(--gold);
        }

        /* ── BUTTONS ── */
        .btn {
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: #0a0f1e;
        }

        .btn-primary:hover {
            box-shadow: var(--shadow-gold);
            transform: translateY(-1px);
        }

        .btn-outline {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        /* Global Desktop styles continue... */

        /* ── SCORE CARDS ── */
        .score-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
        }

        .score-card {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px;
            text-align: center;
        }

        .sc-name {
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }

        .sc-score {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 2px;
        }

        .sc-label {
            font-size: 9px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .sc-a {
            color: var(--accent-green);
        }

        .sc-b {
            color: var(--gold);
        }

        .sc-c {
            color: var(--accent-red);
        }

        /* ── COMMENTS & FEED ── */
        .minister-comment-thread {
            max-height: 300px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
            padding-right: 8px;
        }

        .comment-bubble {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            max-width: 85%;
            font-size: 13px;
            line-height: 1.4;
            position: relative;
        }

        .comment-bubble.minister {
            align-self: flex-end;
            background: var(--gold);
            color: #0a0f1e;
            border-bottom-right-radius: 2px;
        }

        .comment-bubble.admin {
            align-self: flex-start;
            background: var(--bg-glass-hover);
            color: var(--text);
            border-bottom-left-radius: 2px;
            border: 1px solid var(--border);
        }

        .comment-meta {
            font-size: 9px;
            margin-top: 6px;
            opacity: 0.7;
        }

        .activity-feed {
            max-height: 250px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 8px;
        }

        .feed-item {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: var(--text-dim);
            align-items: flex-start;
        }

        .feed-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 4px;
            flex-shrink: 0;
        }

        .feed-time {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        .btn-outline:hover {
            background: var(--bg-glass);
        }

        .btn-ghost-add {
            background: transparent;
            color: var(--text-dim);
            border: 1px dashed var(--border);
            width: 100%;
            justify-content: center;
            padding: 8px;
            font-size: 12px;
            border-radius: var(--radius-xs);
            margin-top: 4px;
        }

        .btn-ghost-add:hover {
            color: var(--gold);
            border-color: var(--gold);
            background: rgba(212, 168, 67, 0.05);
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            padding: 0;
            border-radius: var(--radius-xs);
            justify-content: center;
            background: rgba(248, 113, 113, 0.1);
            color: var(--accent-red);
            border: 1px solid rgba(248, 113, 113, 0.2);
            font-size: 13px;
            flex-shrink: 0;
        }

        .btn-icon:hover {
            background: rgba(248, 113, 113, 0.2);
        }

        .btn-green {
            background: #059669;
            color: #fff;
        }

        .btn-green:hover {
            background: #047857;
        }

        .nav-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
        }

        /* ── LIST ITEMS ── */
        .list-item {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 10px;
            padding: 12px;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }

        .list-item:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .list-item input {
            flex: 1;
            border: none;
            background: transparent;
            font-weight: 500;
            color: var(--text);
            font-size: 13px;
        }

        .list-item input:focus {
            outline: none;
        }

        .list-num {
            font-size: 12px;
            font-weight: 800;
            color: var(--gold);
            width: 24px;
            text-align: center;
            flex-shrink: 0;
        }

        /* ── WEEK CARDS ── */
        .week-card {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 12px;
            overflow: hidden;
        }

        .week-card-head {
            background: linear-gradient(135deg, #1a2a4a, #0f1a2e);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .week-label {
            font-weight: 700;
            font-size: 13px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .week-range {
            font-size: 11px;
            color: var(--text-muted);
        }

        .week-body {
            padding: 12px 16px;
            background: var(--bg-card);
        }

        .event-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 0;
            border-bottom: 1px solid var(--border);
        }

        .event-row:last-child {
            border-bottom: none;
        }

        .event-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot-diesel {
            background: #f59e0b;
        }

        .dot-petrol {
            background: #3b82f6;
        }

        .event-name {
            flex: 1;
            font-size: 13px;
            font-weight: 500;
        }

        .event-date-text {
            font-size: 12px;
            color: var(--text-dim);
            font-variant-numeric: tabular-nums;
            min-width: 140px;
            text-align: right;
        }

        .event-badge {
            font-size: 9px;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 700;
            letter-spacing: 0.05em;
            min-width: 52px;
            text-align: center;
        }

        .badge-d {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }

        .badge-p {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
        }

        .rehearsal-override {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-left: 8px;
        }

        .rehearsal-override select {
            padding: 4px 8px;
            font-size: 11px;
            border-radius: 6px;
            width: auto;
        }

        .special-events-area {
            padding-top: 8px;
        }

        .special-events-title {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .special-event-row {
            display: grid;
            grid-template-columns: 2fr 1fr 70px 90px 65px 32px;
            gap: 6px;
            align-items: end;
            margin-bottom: 8px;
        }

        /* ── TABLES ── */
        .roster-grid,
        .perf-table,
        .spirit-table,
        .summary-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .roster-grid th,
        .perf-table th,
        .spirit-table th {
            background: linear-gradient(135deg, #1a2a4a, #243e7a);
            color: #fff;
            padding: 8px 10px;
            font-size: 10px;
            text-align: left;
        }

        .roster-grid td,
        .perf-table td,
        .spirit-table td {
            padding: 7px 10px;
            border-bottom: 1px solid var(--border);
        }

        /* ── SPC TABLE (Step 5) ── */
        .spc-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 24px;
            font-size: 11px;
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .spc-table th {
            background: var(--bg-glass);
            padding: 10px 6px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            color: var(--text-dim);
            text-transform: uppercase;
            font-size: 8px;
            letter-spacing: 0.05em;
            font-weight: 700;
            border-right: 1px solid var(--border);
        }

        .spc-table th:last-child {
            border-right: none;
        }

        .spc-table td {
            padding: 10px 6px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        .spc-table td:last-child {
            border-right: none;
        }

        .spc-table .name-cell {
            text-align: left;
            font-weight: 700;
            color: var(--text);
            font-size: 11px;
            padding-left: 12px;
        }

        .spc-table .agg-cell {
            font-weight: 900;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.03);
        }

        /* ── EXPENSE TABLE (Step 9) ── */
        .ex-row {
            display: grid;
            grid-template-columns: 110px 1fr 100px 90px 40px;
            gap: 8px;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-glass);
            border-radius: var(--radius-sm);
            margin-bottom: 6px;
        }

        .ex-type-exp {
            color: var(--accent-red);
            font-weight: 700;
            font-size: 10px;
            text-transform: uppercase;
        }

        .ex-type-ref {
            color: var(--accent-green);
            font-weight: 700;
            font-size: 10px;
            text-transform: uppercase;
        }

        .roster-grid tr:nth-child(even) td {
            background: rgba(255, 255, 255, 0.02);
        }

        .roster-grid select,
        .perf-table select,
        .spirit-table select {
            padding: 4px 6px;
            font-size: 11px;
        }

        .perf-table-wrap {
            overflow-x: auto;
        }

        .perf-table td.name-col {
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.03);
        }

        .perf-table th.name-col {
            text-align: left;
            min-width: 130px;
        }

        .date-hdr-sub {
            font-size: 9px;
            color: rgba(255, 255, 255, .5);
            display: block;
            font-weight: 400;
        }

        .role-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 12px;
            background: var(--gold);
            color: #0a0f1e;
            letter-spacing: .05em;
        }

        .spirit-section-head {
            background: linear-gradient(135deg, #065f46, #059669);
            color: #fff;
            padding: 8px 14px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            border-radius: 8px 8px 0 0;
            margin-top: 14px;
        }

        .sc-a {
            color: var(--accent-green);
        }

        .sc-b {
            color: var(--gold);
        }

        .sc-c {
            color: var(--accent-red);
        }

        /* ── SCORE CARDS ── */
        .score-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }

        .score-card {
            background: var(--bg-glass);
            border-radius: var(--radius-sm);
            padding: 14px;
            border: 1px solid var(--border);
            text-align: center;
            transition: var(--transition);
        }

        .score-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .score-card .sc-name {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .score-card .sc-score {
            font-size: 24px;
            font-weight: 800;
        }

        .score-card .sc-label {
            font-size: 10px;
            color: var(--text-muted);
        }

        /* ── GENERATE PAGE ── */
        .gen-hero {
            background: linear-gradient(135deg, #0f1a2e 0%, #1a2a4a 50%, #243e7a 100%);
            border-radius: var(--radius);
            padding: 48px 32px;
            text-align: center;
            color: #fff;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .gen-hero::before {
            content: '✝';
            position: absolute;
            font-size: 200px;
            color: rgba(255, 255, 255, 0.02);
            top: -20px;
            right: -20px;
            font-family: serif;
        }

        .gen-hero h2 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            margin-bottom: 6px;
        }

        .gen-hero .gen-sub {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 28px;
        }

        .gen-hero .month-chip {
            display: inline-block;
            background: var(--gold);
            color: #0a0f1e;
            font-weight: 700;
            font-size: 11px;
            padding: 5px 16px;
            border-radius: 20px;
            letter-spacing: 0.06em;
            margin-bottom: 20px;
        }

        .gen-btns {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-gen-excel {
            background: #059669;
            color: #fff;
            padding: 14px 28px;
            font-size: 15px;
            border-radius: var(--radius-sm);
        }

        .btn-gen-excel:hover {
            background: #047857;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(5, 150, 105, 0.3);
        }

        .btn-gen-word {
            background: var(--bg-glass);
            color: #fff;
            border: 1px solid var(--border);
            padding: 14px 28px;
            font-size: 15px;
            border-radius: var(--radius-sm);
        }

        .btn-gen-word:hover {
            background: var(--bg-glass-hover);
            transform: translateY(-2px);
        }

        .week-cost-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-radius: var(--radius-xs);
            margin-bottom: 4px;
            font-size: 13px;
        }

        .week-cost-row:nth-child(odd) {
            background: var(--bg-glass);
        }

        .week-cost-label {
            color: var(--text-dim);
            font-size: 12px;
        }

        .week-cost-amt {
            font-weight: 700;
            color: var(--gold);
        }

        .tag {
            display: inline-block;
            font-size: 9px;
            padding: 2px 7px;
            border-radius: 12px;
            font-weight: 600;
            margin-right: 4px;
        }

        .tag-d {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }

        .tag-p {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
        }

        .tag-sp {
            background: rgba(52, 211, 153, 0.15);
            color: var(--accent-green);
        }

        .save-note {
            background: rgba(96, 165, 250, 0.1);
            border: 1px solid rgba(96, 165, 250, 0.2);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            font-size: 12px;
            color: var(--accent-blue);
            margin-bottom: 12px;
        }

        .summary-table th {
            text-align: left;
            padding: 8px 12px;
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            border-bottom: 1px solid var(--border);
        }

        .summary-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
        }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--accent-green);
            color: #fff;
            padding: 10px 18px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            box-shadow: var(--shadow);
            opacity: 0;
            transform: translateY(10px);
            transition: opacity .25s, transform .25s;
            z-index: 9999;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── DRAWER ── */
        .drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .6);
            z-index: 800;
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s;
        }

        .drawer-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .drawer {
            position: fixed;
            top: 0;
            right: -520px;
            width: 500px;
            max-width: 95vw;
            height: 100vh;
            background: var(--bg-card-solid);
            box-shadow: -6px 0 32px rgba(0, 0, 0, .4);
            z-index: 900;
            transition: right .3s cubic-bezier(.4, 0, .2, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .drawer.open {
            right: 0;
        }

        .drawer-head {
            background: linear-gradient(135deg, #1a2a4a, #0f1a2e);
            color: #fff;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            border-bottom: 1px solid var(--border);
        }

        .drawer-head h3 {
            font-size: 16px;
            font-family: 'Playfair Display', serif;
        }

        .drawer-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .log-card {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px;
            margin-bottom: 12px;
        }

        .log-card-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: .05em;
        }

        /* ── MODALS ── */
        .pin-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .7);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pin-box {
            background: var(--bg-card-solid);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            width: 320px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .pin-box h4 {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: #fff;
            margin-bottom: 6px;
        }

        .pin-box p {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 16px;
        }

        .pin-input {
            width: 100%;
            text-align: center;
            font-size: 20px;
            letter-spacing: .3em;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: monospace;
            margin-bottom: 16px;
            background: var(--bg-glass);
            color: #fff;
        }

        .bio-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg-deep);
            z-index: 2000;
            flex-direction: column;
        }

        .bio-modal-header {
            background: linear-gradient(135deg, #1a2a4a, #0f1a2e);
            color: #fff;
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .bio-body {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
        }

        .bio-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-card);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .bio-table th {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 16px;
            text-align: left;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        .bio-table td {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
        }

        .bio-table input {
            width: 100%;
            border: 1px solid transparent;
            padding: 6px 8px;
            font-size: 12px;
            border-radius: 6px;
            background: transparent;
            color: var(--text);
            transition: var(--transition);
        }

        .bio-table input:focus {
            background: var(--bg-glass);
            border-color: var(--border);
            outline: none;
        }

        /* ── MINISTER DASHBOARD ── */
        .minister-comment-thread {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 12px;
        }

        .comment-bubble {
            padding: 12px;
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            font-size: 13px;
        }

        .comment-bubble.minister {
            background: rgba(212, 168, 67, 0.1);
            border: 1px solid var(--border-gold);
            border-left: 3px solid var(--gold);
        }

        .comment-bubble.admin {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent-blue);
        }

        .comment-meta {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .activity-feed {
            max-height: 400px;
            overflow-y: auto;
        }

        .feed-item {
            display: flex;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }

        .feed-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 4px;
            flex-shrink: 0;
        }

        .feed-time {
            font-size: 10px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        /* ── ALERTS ── */
        .alert {
            padding: 10px 14px;
            border-radius: var(--radius-xs);
            font-size: 13px;
            margin-bottom: 14px;
            line-height: 1.5;
        }

        .alert-info {
            background: rgba(96, 165, 250, 0.1);
            color: var(--accent-blue);
            border: 1px solid rgba(96, 165, 250, 0.2);
        }

        .alert-warn {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px)
            }

            to {
                opacity: 1;
                transform: translateX(0)
            }
        }

        .fade-in {
            animation: fadeIn 0.3s ease;
        }

        .slide-in {
            animation: slideIn 0.3s ease;
        }

        /* ── RESPONSIVE ── */
        @media (max-width:768px) {
            .sidebar {
                display: none;
            }

            .main-content {
                padding: 16px;
            }

            .kpi-grid {
                grid-template-columns: 1fr 1fr;
            }

            .pub-stats {
                grid-template-columns: 1fr 1fr 1fr;
            }

            .pub-services {
                grid-template-columns: 1fr;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .form-row-3 {
                grid-template-columns: 1fr;
            }

            .special-event-row {
                grid-template-columns: 1fr 1fr 1fr;
            }

            .g-header {
                padding: 10px 16px;
            }

            .g-title {
                font-size: 15px;
            }
        }

        @media (max-width: 768px) {
            .app-layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                top: 0;
                display: flex;
                flex-direction: row;
                overflow-x: auto;
                padding: 10px;
                border-right: none;
                border-bottom: 1px solid var(--border);
                height: auto !important;
                position: sticky;
                z-index: 10;
                background: var(--bg-deep);
            }

            .sidebar-item {
                flex-shrink: 0;
                margin-bottom: 0;
                padding: 8px 12px;
                font-size: 11px;
                flex-direction: column;
                gap: 4px;
                text-align: center;
                min-width: 70px;
            }

            .sidebar-item .si-icon {
                font-size: 18px;
            }

            .sidebar-label {
                display: none;
            }

            .main-content {
                padding: 16px;
                max-width: 100%;
            }

            .kpi-grid,
            .pub-stats,
            .pub-services,
            .form-row,
            .form-row-3 {
                grid-template-columns: 1fr;
            }

            .db-grid-mobile {
                grid-template-columns: 1fr !important;
            }

            .pub-hero {
                padding: 32px 16px;
            }

            .pub-hero h2 {
                font-size: 22px;
            }

            .spc-table {
                font-size: 11px;
            }

            .glass {
                padding: 16px;
            }

            .g-header {
                padding: 10px 16px;
            }

            .g-title {
                font-size: 16px;
            }
        }

        @media print {

            .g-header,
            .sidebar,
            .nav-row,
            .btn,
            .gen-btns,
            .save-note {
                display: none !important;
            }

            body {
                background: #fff;
                color: #111;
            }

            .glass {
                background: #fff;
                border: 1px solid #ddd;
                box-shadow: none;
                page-break-inside: avoid;
            }
        }

        .step-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--gold);
            margin-top: 2px;
            opacity: 0;
            transition: opacity .2s;
        }

        .step-dot.filled {
            opacity: 1;
        }
    </style>
</head>

<body>

    <!-- Toast -->
    <div class="toast" id="toast">✓ Saved</div>

                onkeydown="if(event.key==='Enter')checkPin()">

                <div>
                    <h2 style="font-size:18px;margin:0;font-family:'Playfair Display',serif">Departmental Bio Data</h2>
                    <p style="font-size:10px;opacity:.6;margin:0;text-transform:uppercase;letter-spacing:.06em">NRCC

    <!-- MAIN APP LAYOUT -->

    <script>
        // ══════════════════════════════════════════
        // FIREBASE
        // ══════════════════════════════════════════
        let db = null, isSyncing = false;
        // Block cloud pushes until we've received the first sync from Firebase
        let hasInitialSynced = false;

        // Fields that are local to each device and should NEVER be synced
        const LOCAL_ONLY_KEYS = ['step', 'currentView', 'isAdminMode', 'firebaseConfig', 'jsonbinKey', 'jsonbinId'];

        function stripLocalFields(obj) {
            const clean = JSON.parse(JSON.stringify(obj));
            LOCAL_ONLY_KEYS.forEach(k => delete clean[k]);
            return clean;
        }

        // Check if state has any real user-entered data (not just defaults)
        function hasRealData() {
            const hasAttendance = Object.keys(state.memberAttendance || {}).length > 0;
            const hasPerformance = Object.keys(state.servicePerformance || {}).length > 0;
            const hasSpiritual = Object.keys(state.spiritualActivities || {}).length > 0;
            const hasExpenses = (state.expenses || []).length > 0;
            const hasMeetings = (state.meetingMinutes || []).length > 0;
            const hasServiceLogs = Object.keys(state.serviceLog || {}).length > 0;
            const hasChecklistLogs = Object.keys(state.checklistLogs || {}).length > 0;
            const hasRoles = (state.roles || []).some(r => r.primary);
            return hasAttendance || hasPerformance || hasSpiritual || hasExpenses || hasMeetings || hasServiceLogs || hasChecklistLogs || hasRoles;
        }

        function mergeRemoteData(remote) {
            // Timestamp conflict resolution: only accept remote if it's newer
            const localTime = state.lastModified || 0;
            const remoteTime = remote.lastModified || 0;
            if (remoteTime < localTime && hasRealData()) {
                console.log('Remote data is older (' + new Date(remoteTime).toLocaleString() + ') than local (' + new Date(localTime).toLocaleString() + ') — skipping merge');
                return false; // Signal: merge was skipped
            }
            // Save local-only state before merging
            const localState = {};
            LOCAL_ONLY_KEYS.forEach(k => { if (state[k] !== undefined) localState[k] = state[k]; });
            // Merge remote data
            Object.assign(state, remote);
            // Restore local-only state so navigation isn't affected
            Object.assign(state, localState);
            return true; // Signal: merge was applied
        }

        function initFirebase() {
            if (!state.firebaseConfig) return;
            try {
                if (!firebase.apps.length) firebase.initializeApp(state.firebaseConfig);
                db = firebase.database();
                setSyncStatus('active', 'Cloud Sync Active');
                db.ref('nrcc_v5').on('value', snap => {
                    if (isSyncing) return;
                    const r = snap.val();
                    if (r) {
                        const merged = mergeRemoteData(r);
                        if (merged) {
                            localStorage.setItem('nrcc_circuit_state', JSON.stringify(state));
                            renderCurrent();
                            showToast('🔄 Synced');
                        } else {
                            console.log('Remote data is stale — keeping local, pushing local to cloud');
                            // Local is newer: push it up so the cloud gets the latest
                            const cloudPayload = stripLocalFields(state);
                            isSyncing = true;
                            db.ref('nrcc_v5').set(cloudPayload).then(() => {
                                setSyncStatus('active', 'Cloud Sync Active');
                                isSyncing = false;
                            }).catch(e => { console.error(e); isSyncing = false; });
                        }
                    } else if (hasRealData()) {
                        // Firebase is empty but we have local data — push it up to restore cloud
                        console.log('Firebase empty but local has data — restoring cloud');
                        state.lastModified = Date.now();
                        const cloudPayload = stripLocalFields(state);
                        isSyncing = true;
                        setSyncStatus('syncing', 'Restoring cloud...');
                        db.ref('nrcc_v5').set(cloudPayload).then(() => {
                            setSyncStatus('active', 'Cloud Sync Active');
                            isSyncing = false;
                            showToast('☁️ Data restored to cloud');
                        }).catch(e => { console.error(e); isSyncing = false; });
                    }
                    // Mark that we've completed at least one sync — safe to push now
                    hasInitialSynced = true;
                });
            } catch (e) { console.error(e); setSyncStatus('error', 'Sync Error — Check DB Rules'); }
        }

        // ══════════════════════════════════════════
        // JSONBIN SYNC (Alternative to Firebase)
        // ══════════════════════════════════════════
        let jsonbinPollTimer = null;
        async function jsonbinPush() {
            const { jsonbinKey, jsonbinId } = state;
            if (!jsonbinKey || !jsonbinId) return;
            isSyncing = true; setSyncStatus('syncing', 'Syncing...');
            try {
                const payload = stripLocalFields(state);
                const res = await fetch(`https://api.jsonbin.io/v3/b/${jsonbinId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': jsonbinKey },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error('PUT failed');
                setSyncStatus('active', 'Cloud Sync Active');
            } catch (e) { console.error(e); setSyncStatus('error', 'JSONBin Sync Error'); }
            isSyncing = false;
        }
        async function jsonbinPull() {
            const { jsonbinKey, jsonbinId } = state;
            if (!jsonbinKey || !jsonbinId) return;
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${jsonbinId}/latest`, {
                    headers: { 'X-Master-Key': jsonbinKey }
                });
                if (!res.ok) throw new Error('GET failed');
                const data = await res.json();
                const remote = data.record;
                if (remote && remote.year) {
                    const merged = mergeRemoteData(remote);
                    if (merged) {
                        localStorage.setItem('nrcc_circuit_state', JSON.stringify(state));
                        renderCurrent();
                        showToast('🔄 Synced from cloud');
                    }
                    setSyncStatus('active', 'Cloud Sync Active');
                }
            } catch (e) { console.error(e); setSyncStatus('error', 'JSONBin Pull Error'); }
        }
        function initJsonbin() {
            if (!state.jsonbinKey || !state.jsonbinId) return;
            setSyncStatus('active', 'Cloud Sync Active');
            jsonbinPull();
            if (jsonbinPollTimer) clearInterval(jsonbinPollTimer);
            jsonbinPollTimer = setInterval(jsonbinPull, 30000); // pull every 30s
        }
        function setSyncStatus(type, text) {
            const d = document.getElementById('sync-dot'), t = document.getElementById('sync-text');
            if (!d || !t) return;
            d.className = 'sync-dot' + (type === 'active' ? ' active sync-syncing' : '');
            if (type === 'active') setTimeout(() => d.classList.remove('sync-syncing'), 2000);
            t.textContent = text;
            t.title = type === 'error' ? 'Firebase DB rules may be blocking writes. In Firebase Console → Realtime Database → Rules, set \"write\": true temporarily to test.' : '';
            t.style.cursor = type === 'error' ? 'help' : '';
            t.style.color = type === 'error' ? 'var(--accent-red)' : '';
            t.style.fontWeight = type === 'error' ? '700' : '';
            if (type === 'syncing') d.classList.add('sync-syncing'); else if (type !== 'active') d.classList.remove('sync-syncing');
        }
        function toggleAdminMode() {

        // ══════════════════════════════════════════

        // ══════════════════════════════════════════
        const MONTHS = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        const DAYS = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const SHORT_DAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        function getWeekdaysInMonth(y, m, wd) { const a = [], d = new Date(y, m, 1); while (d.getMonth() === m) { if (d.getDay() === wd) a.push(new Date(d)); d.setDate(d.getDate() + 1); } return a; }
        function addDays(date, n) { const d = new Date(date); d.setDate(d.getDate() + n); return d; }
        function fmtXL(date) { if (!date) return ''; const d = new Date(date); return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`; }
        function fmtFull(date) { if (!date) return '—'; return new Date(date).toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' }); }
        function fmtDisplay(date) { if (!date) return '—'; return new Date(date).toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' }); }
        function ceil10(n) { return Math.ceil(n / 10) * 10; }
        const REH_OFFSETS = { 4: -3, 5: -2, 6: -1 };
        function getRehDate(sun, dayNum) { return addDays(sun, REH_OFFSETS[dayNum] ?? -2); }
        function fmtISO(date) { if (!date) return ''; const d = new Date(date); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; }
        function dateKey(date) { return fmtISO(date); }
        function getActiveMembers() { return state.teamMembers.filter(m => m.trim()); }
        function getServiceDatesForRoster() {
            const dates = [];
            (state.weeks || []).forEach(wk => {
                if (wk.wednesday) dates.push({ date: wk.wednesday, label: `Mid-Week — ${fmtDisplay(wk.wednesday)}` });
                if (wk.sunday) dates.push({ date: wk.sunday, label: `Sunday — ${fmtDisplay(wk.sunday)}` });
                (wk.specials || []).forEach(ev => { if (ev.name && ev.date) dates.push({ date: new Date(ev.date), label: `${ev.name} — ${fmtDisplay(new Date(ev.date))}` }); });
            });
            return dates.filter(d => d.date).sort((a, b) => new Date(a.date) - new Date(b.date));
        }
        function calcMemberScore(member, svcDates) {
            const serviceOnly = svcDates.filter(s => s.label.toLowerCase().includes('sunday') || s.label.toLowerCase().includes('mid-week'));
            const nw = state.weeks.length || 1;

            // 1. Punctuality (20 pts)
            let puncScore = 0;
            if (serviceOnly.length > 0) {
                let puncPoints = 0;
                serviceOnly.forEach(svc => {
                    const dk = dateKey(svc.date), att = (state.memberAttendance[dk]?.entries || {})[member] || {}, p = state.servicePerformance[member]?.[dk] || {};
                    let ot = p.onTime;
                    if (att.arrivalTime) {
                        const [h, m] = att.arrivalTime.split(':').map(Number), val = h * 60 + (m || 0), isSunday = svc.label.toLowerCase().includes('sunday');
                        if (isSunday) { if (val <= 7 * 60 + 10) ot = 'Ideal'; else if (val <= 7 * 60 + 20) ot = 'Y'; else ot = 'N'; }
                        else { if (val <= 17 * 60) ot = 'Ideal'; else if (val <= 17 * 60 + 30) ot = 'Y'; else ot = 'N'; }
                    }
                    if (ot === 'Ideal') puncPoints += 1; else if (ot === 'Y') puncPoints += 0.75;
                });
                puncScore = Math.round((puncPoints / serviceOnly.length) * 20);
            }

            // 2. Dress Code (20 pts)
            let dressScore = 0;
            if (serviceOnly.length > 0) {
                let dressPoints = 0;
                serviceOnly.forEach(svc => {
                    const dk = dateKey(svc.date), p = state.servicePerformance[member]?.[dk] || {};
                    if (p.dressCode === 'Y') dressPoints++;
                });
                dressScore = Math.round((dressPoints / serviceOnly.length) * 20);
            }

            // 3. Physical Meetings (20 pts)
            const fridayAtt = (state.spiritualActivities[member]?.friday || []).filter(v => v === 'Y').length;
            const physicalScore = Math.round((fridayAtt / nw) * 20);

            // 4. Online Meetings (20 pts)
            const saturdayAtt = (state.spiritualActivities[member]?.saturday || []).filter(v => v === 'Y').length;
            const onlineScore = Math.round((saturdayAtt / nw) * 20);

            // 5. Duties (20 pts)
            let dutyScore = 0;
            if (serviceOnly.length > 0) {
                let presentCount = 0;
                serviceOnly.forEach(svc => {
                    const dk = dateKey(svc.date), p = state.servicePerformance[member]?.[dk] || {}, att = (state.memberAttendance[dk]?.entries || {})[member] || {};
                    if (att.present || p.attended === 'Y') presentCount++;
                });
                dutyScore = Math.round((presentCount / serviceOnly.length) * 20);
            }

            const aggregate = puncScore + dressScore + physicalScore + onlineScore + dutyScore;
            return { punc: puncScore, dress: dressScore, physical: physicalScore, online: onlineScore, duty: dutyScore, aggregate };
        }

                    return;

                return { sunday, wednesday: addDays(sunday, -4), rehDayOverride: ex.rehDayOverride ?? null, rehDate: getRehDate(sunday, rehDayNum), specials: ex.specials ?? [] };

        // ══════════════════════════════════════════
