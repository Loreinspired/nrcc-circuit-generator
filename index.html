<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NRCC Circuit · Department Hub</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-deep: #060d1f;
            --bg-card: rgba(255, 255, 255, 0.06);
            --bg-card-solid: #0f1a2e;
            --bg-glass: rgba(255, 255, 255, 0.08);
            --bg-glass-hover: rgba(255, 255, 255, 0.12);
            --gold: #d4a843;
            --gold-light: #f0d078;
            --gold-glow: rgba(212, 168, 67, 0.25);
            --accent-green: #34d399;
            --accent-red: #f87171;
            --accent-blue: #60a5fa;
            --accent-purple: #a78bfa;
            --text: #e8eaf0;
            --text-dim: rgba(255, 255, 255, 0.55);
            --text-muted: rgba(255, 255, 255, 0.35);
            --border: rgba(255, 255, 255, 0.08);
            --border-gold: rgba(212, 168, 67, 0.3);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --shadow-gold: 0 4px 20px rgba(212, 168, 67, 0.15);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 6px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 20% 50%, rgba(212, 168, 67, 0.06) 0%, transparent 50%), radial-gradient(ellipse at 80% 20%, rgba(96, 165, 250, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── GLOBAL HEADER ── */
        .g-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(6, 13, 31, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .g-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .g-logo {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--gold), #b8860b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: var(--shadow-gold);
        }

        .g-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        .g-subtitle {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sync-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent-red);
            display: inline-block;
        }

        .sync-dot.active {
            background: var(--accent-green);
            box-shadow: 0 0 8px rgba(52, 211, 153, 0.5);
        }

        @keyframes pulse {
            0% {
                opacity: 1
            }

            50% {
                opacity: .4
            }

            100% {
                opacity: 1
            }
        }

        .sync-syncing {
            animation: pulse 1s infinite;
        }

        .g-header-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .g-btn {
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--bg-glass);
            color: var(--text);
            transition: var(--transition);
            white-space: nowrap;
        }

        .g-btn:hover {
            background: var(--bg-glass-hover);
            transform: translateY(-1px);
        }

        .g-btn-gold {
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: #0a0f1e;
            border: none;
            font-weight: 700;
        }

        .g-btn-gold:hover {
            box-shadow: var(--shadow-gold);
        }

        /* ── GLASS CARDS ── */
        .glass {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 16px;
            transition: var(--transition);
        }

        .glass:hover {
            border-color: rgba(255, 255, 255, 0.12);
        }

        .glass-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .glass-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .glass-icon-navy {
            background: linear-gradient(135deg, #1a2a4a, #243e7a);
        }

        .glass-icon-gold {
            background: linear-gradient(135deg, var(--gold), #b8860b);
        }

        .glass-icon-green {
            background: linear-gradient(135deg, #065f46, #059669);
        }

        .glass h2 {
            font-family: 'Playfair Display', serif;
            font-size: 17px;
            color: #fff;
        }

        .glass .subtitle {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        /* ── LAYOUT ── */
        .app-layout {
            display: flex;
            min-height: calc(100vh - 60px);
            position: relative;
            z-index: 1;
        }

        .sidebar {
            width: 220px;
            background: rgba(6, 13, 31, 0.6);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border);
            padding: 20px 12px;
            flex-shrink: 0;
            position: sticky;
            top: 60px;
            height: calc(100vh - 60px);
            overflow-y: auto;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            color: var(--text-dim);
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 4px;
            border: 1px solid transparent;
        }

        .sidebar-item:hover {
            background: var(--bg-glass);
            color: var(--text);
        }

        .sidebar-item.active {
            background: var(--bg-glass-hover);
            color: var(--gold);
            border-color: var(--border-gold);
            font-weight: 600;
        }

        .sidebar-item .si-icon {
            font-size: 16px;
            width: 20px;
            text-align: center;
        }

        .sidebar-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            padding: 16px 14px 8px;
            font-weight: 700;
        }

        .main-content {
            flex: 1;
            padding: 28px 32px 60px;
            max-width: 900px;
        }

        /* ── PUBLIC HUB ── */
        .pub-hero {
            background: linear-gradient(135deg, #0f1a2e 0%, #1a2a4a 50%, #0f1a2e 100%);
            border-radius: var(--radius);
            padding: 48px 32px;
            text-align: center;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .pub-hero::before {
            content: '✝';
            position: absolute;
            font-size: 200px;
            color: rgba(212, 168, 67, 0.04);
            top: -20px;
            right: -20px;
            font-family: serif;
        }

        .pub-hero .month-chip {
            display: inline-block;
            background: var(--gold);
            color: #0a0f1e;
            font-weight: 700;
            font-size: 11px;
            padding: 5px 16px;
            border-radius: 20px;
            letter-spacing: 0.06em;
            margin-bottom: 16px;
        }

        .pub-hero h2 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: #fff;
            margin-bottom: 8px;
        }

        .pub-hero .pub-sub {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 28px;
        }

        .pub-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .pub-stat {
            background: var(--bg-glass);
            border-radius: var(--radius-sm);
            padding: 16px 12px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .pub-stat .val {
            font-size: 24px;
            font-weight: 800;
            color: var(--gold);
        }

        .pub-stat .lbl {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-top: 4px;
        }

        .pub-services {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .pub-svc-card {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 20px;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
        }

        .pub-svc-card:hover {
            background: var(--bg-glass-hover);
            border-color: var(--gold);
            transform: translateY(-2px);
        }

        .pub-svc-card .svc-emoji {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .pub-svc-card .svc-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .pub-svc-card .svc-date {
            font-size: 11px;
            color: var(--text-dim);
        }

        /* ── KPI CARDS ── */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .kpi {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
            transition: var(--transition);
        }

        .kpi:hover {
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .kpi .kpi-val {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .kpi .kpi-lbl {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 6px;
        }

        .kpi .kpi-sub {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* ── FORMS ── */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .form-row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group.full {
            grid-column: 1/-1;
        }

        label.field-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        input[type="text"],
        input[type="number"],
        input[type="time"],
        select,
        textarea {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            color: var(--text);
            background: var(--bg-glass);
            width: 100%;
            transition: var(--transition);
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px var(--gold-glow);
            background: rgba(255, 255, 255, 0.05);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        ::placeholder {
            color: var(--text-muted);
        }

        /* ── RADIO OPTIONS ── */
        .radio-group {
            display: flex;
            gap: 8px;
        }

        .radio-option {
            flex: 1;
            position: relative;
        }

        .radio-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
        }

        .radio-option label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 8px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dim);
            background: var(--bg-glass);
            transition: var(--transition);
            user-select: none;
        }

        .radio-option input:checked+label {
            border-color: var(--gold);
            background: rgba(212, 168, 67, 0.15);
            color: var(--gold);
        }

        /* ── BUTTONS ── */
        .btn {
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: #0a0f1e;
        }

        .btn-primary:hover {
            box-shadow: var(--shadow-gold);
            transform: translateY(-1px);
        }

        .btn-outline {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-outline:hover {
            background: var(--bg-glass);
        }

        .btn-ghost-add {
            background: transparent;
            color: var(--text-dim);
            border: 1px dashed var(--border);
            width: 100%;
            justify-content: center;
            padding: 8px;
            font-size: 12px;
            border-radius: var(--radius-xs);
            margin-top: 4px;
        }

        .btn-ghost-add:hover {
            color: var(--gold);
            border-color: var(--gold);
            background: rgba(212, 168, 67, 0.05);
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            padding: 0;
            border-radius: var(--radius-xs);
            justify-content: center;
            background: rgba(248, 113, 113, 0.1);
            color: var(--accent-red);
            border: 1px solid rgba(248, 113, 113, 0.2);
            font-size: 13px;
            flex-shrink: 0;
        }

        .btn-icon:hover {
            background: rgba(248, 113, 113, 0.2);
        }

        .btn-green {
            background: #059669;
            color: #fff;
        }

        .btn-green:hover {
            background: #047857;
        }

        .nav-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
        }

        /* ── LIST ITEMS ── */
        .list-item {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 10px;
            padding: 12px;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }

        .list-item:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .list-item input {
            flex: 1;
            border: none;
            background: transparent;
            font-weight: 500;
            color: var(--text);
            font-size: 13px;
        }

        .list-item input:focus {
            outline: none;
        }

        .list-num {
            font-size: 12px;
            font-weight: 800;
            color: var(--gold);
            width: 24px;
            text-align: center;
            flex-shrink: 0;
        }

        /* ── WEEK CARDS ── */
        .week-card {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 12px;
            overflow: hidden;
        }

        .week-card-head {
            background: linear-gradient(135deg, #1a2a4a, #0f1a2e);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .week-label {
            font-weight: 700;
            font-size: 13px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .week-range {
            font-size: 11px;
            color: var(--text-muted);
        }

        .week-body {
            padding: 12px 16px;
            background: var(--bg-card);
        }

        .event-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 0;
            border-bottom: 1px solid var(--border);
        }

        .event-row:last-child {
            border-bottom: none;
        }

        .event-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot-diesel {
            background: #f59e0b;
        }

        .dot-petrol {
            background: #3b82f6;
        }

        .event-name {
            flex: 1;
            font-size: 13px;
            font-weight: 500;
        }

        .event-date-text {
            font-size: 12px;
            color: var(--text-dim);
            font-variant-numeric: tabular-nums;
            min-width: 140px;
            text-align: right;
        }

        .event-badge {
            font-size: 9px;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 700;
            letter-spacing: 0.05em;
            min-width: 52px;
            text-align: center;
        }

        .badge-d {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }

        .badge-p {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
        }

        .rehearsal-override {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-left: 8px;
        }

        .rehearsal-override select {
            padding: 4px 8px;
            font-size: 11px;
            border-radius: 6px;
            width: auto;
        }

        .special-events-area {
            padding-top: 8px;
        }

        .special-events-title {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .special-event-row {
            display: grid;
            grid-template-columns: 2fr 1fr 70px 90px 65px 32px;
            gap: 6px;
            align-items: end;
            margin-bottom: 8px;
        }

        /* ── TABLES ── */
        .roster-grid,
        .perf-table,
        .spirit-table,
        .summary-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .roster-grid th,
        .perf-table th,
        .spirit-table th {
            background: linear-gradient(135deg, #1a2a4a, #243e7a);
            color: #fff;
            padding: 8px 10px;
            font-size: 10px;
            text-align: left;
        }

        .roster-grid td,
        .perf-table td,
        .spirit-table td {
            padding: 7px 10px;
            border-bottom: 1px solid var(--border);
        }

        .roster-grid tr:nth-child(even) td {
            background: rgba(255, 255, 255, 0.02);
        }

        .roster-grid select,
        .perf-table select,
        .spirit-table select {
            padding: 4px 6px;
            font-size: 11px;
        }

        .perf-table-wrap {
            overflow-x: auto;
        }

        .perf-table td.name-col {
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.03);
        }

        .perf-table th.name-col {
            text-align: left;
            min-width: 130px;
        }

        .date-hdr-sub {
            font-size: 9px;
            color: rgba(255, 255, 255, .5);
            display: block;
            font-weight: 400;
        }

        .role-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 12px;
            background: var(--gold);
            color: #0a0f1e;
            letter-spacing: .05em;
        }

        .spirit-section-head {
            background: linear-gradient(135deg, #065f46, #059669);
            color: #fff;
            padding: 8px 14px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            border-radius: 8px 8px 0 0;
            margin-top: 14px;
        }

        .sc-a {
            color: var(--accent-green);
        }

        .sc-b {
            color: var(--gold);
        }

        .sc-c {
            color: var(--accent-red);
        }

        /* ── SCORE CARDS ── */
        .score-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }

        .score-card {
            background: var(--bg-glass);
            border-radius: var(--radius-sm);
            padding: 14px;
            border: 1px solid var(--border);
            text-align: center;
            transition: var(--transition);
        }

        .score-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .score-card .sc-name {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .score-card .sc-score {
            font-size: 24px;
            font-weight: 800;
        }

        .score-card .sc-label {
            font-size: 10px;

    <!-- MAIN APP LAYOUT -->
    <div id="appRoot"></div>

    <script>
        // ══════════════════════════════════════════
        // FIREBASE
        // ══════════════════════════════════════════
        let db = null, isSyncing = false;
        function initFirebase() {
            if (!state.firebaseConfig) return;
            try {
                if (!firebase.apps.length) firebase.initializeApp(state.firebaseConfig);
                db = firebase.database();
                setSyncStatus('active', 'Cloud Sync Active');
                db.ref('nrcc_v5').on('value', snap => {
                    if (isSyncing) return;
                    const r = snap.val();
                    if (r) { Object.assign(state, r); renderCurrent(); showToast('🔄 Synced'); }
                });
            } catch (e) { console.error(e); setSyncStatus('error', 'Sync Failed'); }
        }
        function setSyncStatus(type, text) {
            const d = document.getElementById('sync-dot'), t = document.getElementById('sync-text');
            if (!d || !t) return;
            d.className = 'sync-dot' + (type === 'active' ? ' active' : '');
            t.textContent = text;
            if (type === 'syncing') d.classList.add('sync-syncing'); else d.classList.remove('sync-syncing');
        }
        function toggleAdminMode() {
            if (state.currentView === 'admin') { state.currentView = 'public'; state.isAdminMode = false; renderCurrent(); return; }
            if (state.currentView === 'minister') { state.currentView = 'public'; renderCurrent(); return; }
            const pin = prompt('Enter Access PIN:');
            if (!pin) return;
            if (pin === state.adminPin) { state.currentView = 'admin'; state.isAdminMode = true; renderCurrent(); }
            else if (pin === state.ministerPin) { state.currentView = 'minister'; renderCurrent(); }
            else alert('Incorrect PIN');
        }

        // ══════════════════════════════════════════
        // HELPERS
        // ══════════════════════════════════════════
        const MONTHS = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        const DAYS = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const SHORT_DAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        function getWeekdaysInMonth(y, m, wd) { const a = [], d = new Date(y, m, 1); while (d.getMonth() === m) { if (d.getDay() === wd) a.push(new Date(d)); d.setDate(d.getDate() + 1); } return a; }
        function addDays(date, n) { const d = new Date(date); d.setDate(d.getDate() + n); return d; }
        function fmtXL(date) { if (!date) return ''; const d = new Date(date); return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`; }
        function fmtFull(date) { if (!date) return '—'; return new Date(date).toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' }); }
        function fmtDisplay(date) { if (!date) return '—'; return new Date(date).toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' }); }
        function ceil10(n) { return Math.ceil(n / 10) * 10; }
        const REH_OFFSETS = { 4: -3, 5: -2, 6: -1 };
        function getRehDate(sun, dayNum) { return addDays(sun, REH_OFFSETS[dayNum] ?? -2); }
        function fmtISO(date) { if (!date) return ''; const d = new Date(date); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; }
        function dateKey(date) { return fmtISO(date); }
        function getActiveMembers() { return state.teamMembers.filter(m => m.trim()); }
        function getServiceDatesForRoster() {
            const dates = [];
            state.weeks.forEach(wk => {
                dates.push({ date: wk.wednesday, label: `Mid-Week — ${fmtDisplay(wk.wednesday)}` });
                dates.push({ date: wk.sunday, label: `Sunday — ${fmtDisplay(wk.sunday)}` });
                wk.specials.forEach(ev => { if (ev.name && ev.date) dates.push({ date: new Date(ev.date), label: `${ev.name} — ${fmtDisplay(new Date(ev.date))}` }); });
            });
            return dates.filter(d => d.date).sort((a, b) => new Date(a.date) - new Date(b.date));
        }
        function calcMemberScore(member, svcDates) {
            const serviceOnly = svcDates.filter(s => s.label.toLowerCase().includes('sunday') || s.label.toLowerCase().includes('mid-week'));
            let total = 0, possible = 0;
            serviceOnly.forEach(svc => {
                const dk = dateKey(svc.date), p = state.servicePerformance[member]?.[dk] || {}, att = (state.memberAttendance[dk]?.entries || {})[member] || {};
                const isPresent = att.present ?? (p.attended === 'Y');
                let arrival = att.arrivalTime || '';
                possible += 3; // Attendance, On-time, Dress Code
                if (isPresent) total++;
                let onTimeStatus = p.onTime;
                if (arrival) {
                    const [h, m] = arrival.split(':').map(Number), val = h * 60 + (m || 0), isSunday = svc.label.toLowerCase().includes('sunday');
                    if (isSunday) { if (val <= 7 * 60 + 10) onTimeStatus = 'Ideal'; else if (val <= 7 * 60 + 20) onTimeStatus = 'Y'; else onTimeStatus = 'N'; }
                    else { if (val <= 17 * 60) onTimeStatus = 'Ideal'; else if (val <= 17 * 60 + 30) onTimeStatus = 'Y'; else onTimeStatus = 'N'; }
                }
                if (onTimeStatus === 'Ideal') total += 1.25; else if (onTimeStatus === 'Y') total += 1;
                if (p.dressCode === 'Y') total++;
                if (p.tasksDone) { possible++; total += p.tasksDone === 'All' ? 1 : p.tasksDone === 'Most' ? .75 : p.tasksDone === 'Some' ? .5 : 0; }
                if (p.verified) { possible++; total += p.verified === 'All' ? 1 : p.verified === 'Most' ? .75 : p.verified === 'Some' ? .5 : 0; }
            });
            return possible === 0 ? 0 : Math.min(100, Math.round((total / possible) * 100));
        }

        // ══════════════════════════════════════════
        // STATE
        // ══════════════════════════════════════════
        const ROLE_DEFS = [
            { code: 'GEN', name: 'Generator Operator' }, { code: 'MIC', name: 'Microphone Tech' }, { code: 'HVAC', name: 'HVAC Operator' },
            { code: 'SND', name: 'Sound Engineer' }, { code: 'REC', name: 'Sound Engineer (Recording)' }, { code: 'EXT', name: 'External Sound' }, { code: 'COORD', name: 'Service Coordinator' }
        ];
        const DEFAULT_STATE = {
            step: 1, month: new Date().getMonth(), year: new Date().getFullYear(),
            dieselPrice: 1000, petrolPrice: 845, defaultRehDay: 5, weeks: [],
            teamMembers: ['Tamilore Adeogun', 'Ayodeji Ojo', 'Promise Okpala', 'David Falodi', 'Segun Olayioye', 'Esther Victor', 'Olawale Esho', 'Oluwatosin Ayilola', 'Abiodun Ojo'],
            goals: ['Listen to Messages of the week', 'Re-listen to Sunday and Midweek messages', 'Listen to service recordings and evaluate sound quality', 'Sowing seed towards departmental purse'],
            seedBalance: '', budgetBalance: '', specialActivities: '',
            roles: ROLE_DEFS.map(r => ({ ...r, primary: '', alt1: '', alt2: '' })),
            serviceAssignments: {}, servicePerformance: {}, spiritualActivities: {},

            const membersLi = state.teamMembers.filter(m => m.trim()).map(m => `<li>${m}</li>`).join('') || '<li>[No members]</li>';
            const goalsLi = state.goals.filter(g => g.trim()).map(g => `<li>${g}</li>`).join('') || '<li>[No goals]</li>';
            const serviceRows = state.weeks.map((wk, i) => `<tr><td>Week ${i + 1}</td><td>${fmtFull(wk.wednesday)}</td><td>${fmtFull(wk.sunday)}</td><td>${fmtFull(wk.rehDate)}</td><td>${wk.specials.filter(e => e.name).map(e => e.name).join(', ') || '—'}</td></tr>`).join('');
            const members = getActiveMembers(), svcDates = getServiceDatesForRoster();
            let perfSection = ''; if (members.length > 0) { const perfRows = members.map(m => { const sc = calcMemberScore(m, svcDates); const col = sc >= 80 ? '#155724' : sc >= 60 ? '#856404' : '#842029'; const bg = sc >= 80 ? '#d4edda' : sc >= 60 ? '#fff3cd' : '#f8d7da'; return `<tr><td>${m}</td><td style="text-align:center"><strong style="color:${col};background:${bg};padding:2pt 6pt;border-radius:3pt">${sc}%</strong></td></tr>`; }).join(''); perfSection = `<h2>Steward Performance</h2><table><thead><tr><th>Steward</th><th>Score</th></tr></thead><tbody>${perfRows}</tbody></table>`; }
            let spiritSection = ''; if (members.length > 0) { const nw = state.weeks.length || 5; const spiritRows = members.map(m => { const fr = (state.spiritualActivities[m]?.friday || []).filter(v => v === 'Y').length; const sa = (state.spiritualActivities[m]?.saturday || []).filter(v => v === 'Y').length; return `<tr><td>${m}</td><td style="text-align:center">${fr}/${nw}</td><td style="text-align:center">${sa}/${nw}</td></tr>`; }).join(''); spiritSection = `<h2>Spiritual Activities</h2><table><thead><tr><th>Steward</th><th>Friday (${nw} wks)</th><th>Saturday (${nw} wks)</th></tr></thead><tbody>${spiritRows}</tbody></table>`; }
            let rosterSection = ''; if (state.roles && state.roles.some(r => r.primary)) { const rRows = state.roles.map(r => `<tr><td><strong>${r.code}</strong></td><td>${r.name}</td><td>${r.primary || '—'}</td><td>${r.alt1 || '—'}</td><td>${r.alt2 || '—'}</td></tr>`).join(''); rosterSection = `<h2>Roster</h2><table><thead><tr><th>Code</th><th>Role</th><th>Primary</th><th>Alt 1</th><th>Alt 2</th></tr></thead><tbody>${rRows}</tbody></table>`; }
            const html = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Circuit Dept Report ${mo} ${yr}</title><style>body{font-family:Calibri,sans-serif;font-size:12pt;margin:2.54cm;line-height:1.5;color:#111}.church{text-align:center;font-size:18pt;font-weight:bold;text-transform:uppercase;margin-bottom:4pt}.dept-title{text-align:center;font-size:13pt;margin-bottom:4pt}.report-month{text-align:center;font-size:14pt;font-weight:bold;margin-bottom:20pt}h2{font-size:12pt;font-weight:bold;text-transform:uppercase;border-bottom:2px solid #0f1f3d;padding-bottom:3pt;margin:18pt 0 8pt;color:#0f1f3d}p{margin:0 0 8pt}ul{margin:0 0 8pt 24pt}li{margin-bottom:4pt}table{width:100%;border-collapse:collapse;margin:8pt 0;font-size:11pt}th{background:#0f1f3d;color:white;padding:7pt 8pt;text-align:left;font-size:10pt}td{border:1pt solid #ccc;padding:6pt 8pt}tr:nth-child(even) td{background:#f7f7f7}.total-row td{font-weight:bold;background:#fffbeb!important}</style></head><body>
          <div class="church">NEW REALITY CHRISTIAN CENTRE</div><div class="dept-title">ADO-EKITI CAMPUS</div><div class="report-month">CIRCUIT DEPARTMENT REPORT — ${mo.toUpperCase()} ${yr}</div>
          <h2>Introduction</h2><p>The Circuit department is a service of the Church, primarily responsible for providing technical support. The Circuit provides service to every other department, ensuring a successful light and sound experience for the congregation during services and events.</p>
          <h2>Departmental Members</h2><ul>${membersLi}</ul>
          <h2>Goals for ${mo} ${yr}</h2><ul>${goalsLi}</ul>
          <h2>Services & Events</h2><table><thead><tr><th>Week</th><th>Midweek</th><th>Sunday</th><th>Rehearsal</th><th>Specials</th></tr></thead><tbody>${serviceRows}</tbody></table>
          ${rosterSection}${perfSection}${spiritSection}
          <h2>Financial Details</h2><table><thead><tr><th>Account</th><th>Balance</th></tr></thead><tbody><tr><td>Seed Account</td><td>₦${state.seedBalance || '_____'}</td></tr><tr><td>Budget Account</td><td>₦${state.budgetBalance || '_____'}</td></tr><tr class="total-row"><td>Budgeted Total</td><td>₦${grandTotal.toLocaleString()}</td></tr></tbody></table>
          <p style="font-style:italic;color:#555;font-size:11pt">Note: Diesel ₦${D.toLocaleString()}/ltr · Petrol ₦${P.toLocaleString()}/ltr.</p><br><br><p>Prepared by: ___________________  Date: ___________________</p></body></html>`;
            const blob = new Blob([html], { type: 'application/msword' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `NRCC Circuit Report - ${mo} ${yr}.doc`; a.click(); URL.revokeObjectURL(url);
        }

        // ══════════════════════════════════════════
        // MINISTER DASHBOARD
        // ══════════════════════════════════════════
        function renderMinisterDashboard() {
            const mo = MONTHS[state.month], yr = state.year, members = getActiveMembers(), svcDates = getServiceDatesForRoster();
            const D = state.dieselPrice, P = state.petrolPrice, rehCPH = ceil10(2.5 * P);
            let grandTotal = 0; state.weeks.forEach(wk => { grandTotal += 12 * D * 2.5 + 12 * D * 4 + rehCPH * 3; wk.specials.forEach(ev => { const lph = ev.litresPerHour || 2.5, ft = ev.fuelType || 'petrol'; grandTotal += ceil10(lph * (ft === 'diesel' ? D : P)) * (ev.hours || 3); }); });
            let totalPresent = 0, totalPossible = 0;
            svcDates.forEach(svc => { const dk = dateKey(svc.date), att = state.memberAttendance[dk] || { entries: {} }; totalPresent += Object.values(att.entries).filter(e => e.present).length; totalPossible += members.length; });
            const attPct = totalPossible > 0 ? Math.round((totalPresent / totalPossible) * 100) : 0;
            const avgScore = members.length > 0 ? Math.round(members.reduce((s, m) => s + calcMemberScore(m, svcDates), 0) / members.length) : 0;

            const scorecards = members.map(m => { const sc = calcMemberScore(m, svcDates); const c = sc >= 80 ? 'sc-a' : sc >= 60 ? 'sc-b' : 'sc-c'; return `<div class="score-card"><div class="sc-name">${m.split(' ')[0]}</div><div class="sc-score ${c}">${sc}%</div><div class="sc-label">Performance</div></div>`; }).join('');

            const commentsHtml = (state.ministerComments || []).map(c => `<div class="comment-bubble ${c.from}"><div>${c.text}</div><div class="comment-meta">${c.from === 'minister' ? '👑 Minister' : '🔧 Admin'} · ${new Date(c.time).toLocaleString()}</div></div>`).join('') || '<div style="text-align:center;color:var(--text-muted);padding:20px;font-size:12px">No comments yet</div>';

            const feedHtml = (state.activityLog || []).slice(0, 20).map(a => `<div class="feed-item"><div class="feed-dot" style="background:var(--gold)"></div><div style="flex:1"><div>${a.detail || a.action}</div><div class="feed-time">${new Date(a.time).toLocaleString()}</div></div></div>`).join('') || '<div style="text-align:center;color:var(--text-muted);padding:20px;font-size:12px">No activity yet</div>';

            return `<div class="kpi-grid fade-in">
            <div class="kpi"><div class="kpi-val">${attPct}%</div><div class="kpi-lbl">Attendance</div><div class="kpi-sub">${totalPresent}/${totalPossible} check-ins</div></div>
            <div class="kpi"><div class="kpi-val">₦${(grandTotal / 1000).toFixed(0)}k</div><div class="kpi-lbl">Budget</div><div class="kpi-sub">${mo} ${yr}</div></div>
            <div class="kpi"><div class="kpi-val">${members.length}</div><div class="kpi-lbl">Members</div><div class="kpi-sub">Active stewards</div></div>
            <div class="kpi"><div class="kpi-val">${avgScore}%</div><div class="kpi-lbl">Avg Score</div><div class="kpi-sub">Performance</div></div>
          </div>

          <div class="glass fade-in"><div class="glass-header"><div class="glass-icon glass-icon-gold">📊</div><div><h2>Member Scorecards</h2><div class="subtitle">Color-coded performance overview</div></div></div>
            <div class="score-cards">${scorecards}</div></div>

          <div class="glass fade-in"><div class="glass-header"><div class="glass-icon glass-icon-navy">📥</div><div><h2>Download Center</h2><div class="subtitle">Download reports for any month</div></div></div>
            <div style="display:flex;gap:12px;flex-wrap:wrap"><button class="btn btn-gen-excel" onclick="generateExcel()">📊 Budget (Excel)</button><button class="btn btn-gen-word" onclick="generateWord()">📄 Report (Word)</button></div></div>

          <div class="glass fade-in"><div class="glass-header"><div class="glass-icon glass-icon-gold">💬</div><div><h2>Comments & Questions</h2><div class="subtitle">Leave feedback for the department head</div></div></div>
            <div class="minister-comment-thread">${commentsHtml}</div>
            <div style="display:flex;gap:8px"><input type="text" id="ministerCommentInput" placeholder="Type your comment or question..." style="flex:1">
              <button class="btn btn-primary" onclick="postMinisterComment()">Send</button></div></div>

          <div class="glass fade-in"><div class="glass-header"><div class="glass-icon glass-icon-green">📡</div><div><h2>Live Activity Feed</h2><div class="subtitle">Real-time updates from the department</div></div></div>
            <div class="activity-feed">${feedHtml}</div></div>`;
        }

        function postMinisterComment() {
            const input = document.getElementById('ministerCommentInput');
            if (!input || !input.value.trim()) return;
            if (!state.ministerComments) state.ministerComments = [];
            state.ministerComments.push({ from: state.currentView === 'minister' ? 'minister' : 'admin', text: input.value.trim(), time: new Date().toISOString() });
            input.value = ''; saveState(); renderCurrent();
        }

        // ══════════════════════════════════════════
        // MAIN RENDER
        // ══════════════════════════════════════════
        function renderCurrent() {
            const root = document.getElementById('appRoot');
            const adminBtn = document.getElementById('adminBtn');

            if (state.currentView === 'minister') {
                adminBtn.innerHTML = '🔓 Exit'; adminBtn.className = 'g-btn';
                root.innerHTML = `<div class="main-content" style="max-width:960px;margin:0 auto">
              <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;padding:16px;background:linear-gradient(135deg,rgba(212,168,67,0.1),transparent);border-radius:var(--radius);border:1px solid var(--border-gold)">
                <span style="font-size:28px">👑</span><div><h2 style="font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);margin:0">Minister's Dashboard</h2><div style="font-size:11px;color:var(--text-dim)">${MONTHS[state.month]} ${state.year} · Real-time Overview</div></div>
              </div>${renderMinisterDashboard()}</div>`;
                return;
            }

            if (state.currentView === 'admin') {
                adminBtn.innerHTML = '🔓 Logout'; adminBtn.className = 'g-btn';
                const sidebarHtml = STEP_DEFS.map(s => `<div class="sidebar-item ${state.step === s.n ? 'active' : ''}" onclick="goStep(${s.n})"><span class="si-icon">${s.icon}</span><span>${s.label}</span></div>`).join('');
                let stepHtml = '';
                if (state.step === 1) stepHtml = renderStep1(); else if (state.step === 2) stepHtml = renderStep2();
                else if (state.step === 3) stepHtml = renderStep3(); else if (state.step === 4) stepHtml = renderStep4();
                else if (state.step === 5) stepHtml = renderStep5(); else if (state.step === 6) stepHtml = renderStep6();
                else if (state.step === 7) stepHtml = renderStep7();
                root.innerHTML = `<div class="app-layout"><div class="sidebar slide-in">
              <div class="sidebar-label">Admin Portal</div>${sidebarHtml}
              <div class="sidebar-label" style="margin-top:20px">Tools</div>
              <div class="sidebar-item" onclick="openBioModal()"><span class="si-icon">👤</span><span>Bio Data</span></div>
              <div class="sidebar-item" onclick="clearData()"><span class="si-icon">🗑</span><span>Clear Data</span></div>
            </div><div class="main-content">${stepHtml}</div></div>`;
                return;
            }

            // PUBLIC VIEW
            adminBtn.innerHTML = '🔐 Admin'; adminBtn.className = 'g-btn g-btn-gold';
            const members = getActiveMembers(), svcDates = getServiceDatesForRoster();
            let totalPresent = 0, totalPossible = 0;
            svcDates.forEach(svc => { const dk = dateKey(svc.date), att = state.memberAttendance[dk] || { entries: {} }; totalPresent += Object.values(att.entries).filter(e => e.present).length; totalPossible += members.length; });
            const nextSvcs = svcDates.filter(s => new Date(s.date) >= new Date()).slice(0, 4);
            const svcCards = nextSvcs.length > 0 ? nextSvcs.map(s => { const isSun = s.label.includes('Sunday'); return `<div class="pub-svc-card" onclick="openDrawer()"><div class="svc-emoji">${isSun ? '⛪' : '🎵'}</div><div class="svc-name">${isSun ? 'Sunday Service' : 'Midweek Service'}</div><div class="svc-date">${fmtDisplay(s.date)}</div></div>`; }).join('') : `<div class="pub-svc-card" onclick="openDrawer()"><div class="svc-emoji">📋</div><div class="svc-name">View All Services</div><div class="svc-date">Open Service Log</div></div>`;

            root.innerHTML = `<div class="main-content" style="max-width:700px;margin:0 auto">
            <div class="pub-hero fade-in"><div class="month-chip">${MONTHS[state.month].toUpperCase()} ${state.year}</div>
              <h2>NRCC Circuit Department</h2><div class="pub-sub">Member Check-in & Service Hub</div>
              <div class="pub-stats"><div class="pub-stat"><div class="val">${members.length}</div><div class="lbl">Team Members</div></div>
                <div class="pub-stat"><div class="val">${totalPresent}</div><div class="lbl">Total Check-ins</div></div>
                <div class="pub-stat"><div class="val">${svcDates.length}</div><div class="lbl">Services</div></div></div>
              <button class="btn btn-primary" style="padding:14px 32px;font-size:15px" onclick="openDrawer()">📋 Mark Attendance</button>
            </div>
            <div class="glass fade-in"><div class="glass-header"><div class="glass-icon glass-icon-navy">📅</div><div><h2>Upcoming Services</h2><div class="subtitle">Tap a service to check in</div></div></div>
              <div class="pub-services">${svcCards}</div></div>
            <div style="text-align:center;padding:20px;color:var(--text-muted);font-size:12px">Administrative tools require authorized access. Tap "Admin" above.</div>
          </div>`;
        }

        // ══════════════════════════════════════════
        // INIT
        // ══════════════════════════════════════════
        if (state.teamMembers.length === 0 || (state.teamMembers.length === 1 && !state.teamMembers[0].trim())) { state.teamMembers = [...DEFAULT_STATE.teamMembers]; saveState(); }
        renderCurrent();
        initFirebase();
    </script>
</body>

</html>
