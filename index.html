            if (n === 1) return state.month !== undefined && state.year;
            if (n === 2) return state.roles && state.roles.some(r => r.primary);
            if (n === 3) return state.weeks && state.weeks.length > 0;
            if (n === 4) return Object.keys(state.spiritualActivities).length > 0;
            if (n === 5) return Object.keys(state.servicePerformance).length > 0;
            if (n === 6) return state.teamMembers.some(m => m.trim()) || state.seedBalance || state.budgetBalance;
            if (n === 7) return state.meetingMinutes && state.meetingMinutes.length > 0;
            if (n === 8) return state.expenses && state.expenses.length > 0;
            if (n === 9) return state.checklists && Object.keys(state.checklists).length > 0;
            return false;
        }
        function calcGrandTotal() {
            computeWeeks();
            const D = state.dieselPrice, P = state.petrolPrice, rehCPH = ceil10(2.5 * P);
            let total = 0;
            (state.weeks || []).forEach(wk => {
                const specials = wk.specials || [];
                const ds = specials.filter(e => e.name && e.fuelType === 'diesel'), ps = specials.filter(e => e.name && (e.fuelType || 'petrol') === 'petrol');
                let weekSub = 12 * D * 2.5 + 12 * D * 4 + rehCPH * 3;
                ds.forEach(e => weekSub += ceil10((e.litresPerHour || 12) * D) * (e.hours || 3));
                ps.forEach(e => weekSub += ceil10((e.litresPerHour || 2.5) * P) * (e.hours || 3));
                total += weekSub;
            });
            return total;
        }
        const STEP_DEFS = [
            { n: 1, icon: '📅', label: 'Calendar' },
            { n: 2, icon: '📋', label: 'Roster' },
            { n: 3, icon: '👥', label: 'Attendance' },
            { n: 4, icon: '🎯', label: 'Role Assignment' },
            { n: 5, icon: '📊', label: 'Steward Performance' },
            { n: 6, icon: '🙏', label: 'Spiritual Activities' },
            { n: 7, icon: '📝', label: 'Meeting' },
            { n: 8, icon: '💸', label: 'Expenses' },
            { n: 9, icon: '☁️', label: 'Sync' }
        ];

        // ══════════════════════════════════════════
        // STEP 1
        // ══════════════════════════════════════════
        function renderStep1() {
            let yearOpts = ''; for (let y = state.year - 1; y <= state.year + 2; y++) yearOpts += `<option value="${y}" ${y === state.year ? 'selected' : ''}>${y}</option>`;
            const monthOpts = MONTHS.map((m, i) => `<option value="${i}" ${i === state.month ? 'selected' : ''}>${m}</option>`).join('');
            const grandTotal = calcGrandTotal();
            return `
  <div class="glass fade-in"><div class="glass-header"><div class="glass-icon glass-icon-navy">📅</div><div><h2>Month Setup</h2><div class="subtitle">Select the month you're preparing</div></div></div>
    <div class="form-row"><div class="form-group"><label class="field-label">Month</label><select onchange="state.month=parseInt(this.value);renderCurrent()">${monthOpts}</select></div>
    <div class="form-group"><label class="field-label">Year</label><select onchange="state.year=parseInt(this.value);renderCurrent()">${yearOpts}</select></div></div></div>
  <div class="glass fade-in"><div class="glass-header"><div class="glass-icon glass-icon-gold">⛽</div><div><h2>Fuel Prices</h2><div class="subtitle">Update if prices have changed</div></div></div>
    <div class="form-row"><div class="form-group"><label class="field-label">Diesel (₦ / litre)</label><input type="number" value="${state.dieselPrice}" onchange="state.dieselPrice=parseFloat(this.value)||1000;renderCurrent()"></div>
    <div class="form-group"><label class="field-label">Petrol (₦ / litre)</label><input type="number" value="${state.petrolPrice}" onchange="state.petrolPrice=parseFloat(this.value)||845;renderCurrent()"></div></div></div>
  <div class="glass fade-in"><div class="glass-header"><div class="glass-icon glass-icon-navy">🎵</div><div><h2>Default Rehearsal Day</h2><div class="subtitle">Override per week in next step</div></div></div>
    <div class="radio-group">${[{ v: 4, l: 'Thursday' }, { v: 5, l: 'Friday' }, { v: 6, l: 'Saturday' }].map(d => `<div class="radio-option"><input type="radio" name="rehDay" id="rd${d.v}" value="${d.v}" ${state.defaultRehDay === d.v ? 'checked' : ''} onchange="state.defaultRehDay=parseInt(this.value);renderCurrent()"><label for="rd${d.v}">${d.l}</label></div>`).join('')}</div></div>
  <div class="glass fade-in"><div class="glass-header"><div class="glass-icon glass-icon-navy">💰</div><div><h2>Budget Summary</h2><div class="subtitle">Anticipated total cost for ${MONTHS[state.month]} ${state.year}</div></div></div>
    <div style="display:flex;justify-content:space-between;padding:12px;background:linear-gradient(135deg,rgba(212,168,67,0.15),rgba(212,168,67,0.05));border-radius:var(--radius-sm);margin-top:8px;font-weight:700"><span>Grand Total</span><span style="color:var(--gold);font-size:20px">₦${grandTotal.toLocaleString()}</span></div>
  </div>
  <div class="nav-row"><div></div><button class="btn btn-primary" onclick="goStep2()">Next: Weekly Events →</button></div>`;
        }

        // ══════════════════════════════════════════
        // STEP 2
        // ══════════════════════════════════════════
        function renderStep2() {
            computeWeeks();
            const hasWarning = state.weeks.some(w => w.wednesday.getMonth() !== state.month || w.rehDate.getMonth() !== state.month);
            const weeksHtml = state.weeks.map((wk, wi) => {
                const rehDay = wk.rehDayOverride ?? state.defaultRehDay;
                const wedWarn = wk.wednesday.getMonth() !== state.month ? ' ⚠️' : '';
                const rehWarn = wk.rehDate.getMonth() !== state.month ? ' ⚠️' : '';
                const specialsHtml = wk.specials.map((ev, ei) => `
      <div class="special-event-row"><div class="form-group"><label class="field-label" style="font-size:9px">Event</label><input type="text" value="${ev.name}" placeholder="e.g. Family Meeting" onchange="state.weeks[${wi}].specials[${ei}].name=this.value;saveState()"></div>
        <div class="form-group"><label class="field-label" style="font-size:9px">Date</label><input type="date" value="${ev.date}" onchange="state.weeks[${wi}].specials[${ei}].date=this.value;saveState()"></div>
        <div class="form-group"><label class="field-label" style="font-size:9px">Hrs</label><input type="number" step="0.5" min="0.5" value="${ev.hours || 3}" onchange="state.weeks[${wi}].specials[${ei}].hours=parseFloat(this.value)||3;saveState()"></div>
        <div class="form-group"><label class="field-label" style="font-size:9px">Fuel</label><select onchange="state.weeks[${wi}].specials[${ei}].fuelType=this.value;state.weeks[${wi}].specials[${ei}].litresPerHour=this.value==='diesel'?12:2.5;saveState()"><option value="petrol"${(ev.fuelType || 'petrol') === 'petrol' ? ' selected' : ''}>Petrol</option><option value="diesel"${ev.fuelType === 'diesel' ? ' selected' : ''}>Diesel</option></select></div>
        <div class="form-group"><label class="field-label" style="font-size:9px">L/Hr</label><input type="number" step="0.5" min="0.5" value="${ev.litresPerHour || 2.5}" onchange="state.weeks[${wi}].specials[${ei}].litresPerHour=parseFloat(this.value)||2.5;saveState()"></div>
        <button class="btn btn-icon" onclick="rmSpecial(${wi},${ei})">✕</button></div>`).join('');
                return `<div class="week-card"><div class="week-card-head"><span class="week-label">Week ${wi + 1}</span><span class="week-range">${MONTHS[state.month]} ${state.year}</span></div>
      <div class="week-body"><div class="event-row"><div class="event-dot dot-diesel"></div><div class="event-name">Midweek Service</div><div class="event-date-text">${fmtDisplay(wk.wednesday)}${wedWarn}</div><span class="event-badge badge-d">DIESEL</span></div>
        <div class="event-row"><div class="event-dot dot-diesel"></div><div class="event-name">Sunday Service</div><div class="event-date-text">${fmtDisplay(wk.sunday)}</div><span class="event-badge badge-d">DIESEL</span></div>
        <div class="event-row"><div class="event-dot dot-petrol"></div><div class="event-name">Rehearsal</div><div class="event-date-text">${fmtDisplay(wk.rehDate)}${rehWarn}</div><span class="event-badge badge-p">PETROL</span>
          <div class="rehearsal-override"><select onchange="overrideReh(${wi},this.value)" style="width:auto;padding:4px 8px;font-size:11px;border-radius:6px"><option value="">Default (${DAYS[state.defaultRehDay]})</option>${[4, 5, 6].filter(d => d !== state.defaultRehDay).map(d => `<option value="${d}" ${wk.rehDayOverride === d ? 'selected' : ''}>${DAYS[d]}</option>`).join('')}</select></div></div>
        ${wk.specials.length > 0 ? `<div class="special-events-area"><div class="special-events-title">Special events</div>${specialsHtml}</div>` : ''}
        <button class="btn btn-ghost-add" style="margin-top:8px" onclick="addSpecial(${wi})">+ Add special event to Week ${wi + 1}</button></div></div>`;
            }).join('');
            return `${hasWarning ? `<div class="alert alert-warn">⚠️ Some dates fall outside ${MONTHS[state.month]}. Normal for first/last week.</div>` : ''}
  <div class="glass fade-in"><div class="glass-header"><div class="glass-icon glass-icon-navy">📋</div><div><h2>Weekly Events — ${MONTHS[state.month]} ${state.year}</h2><div class="subtitle">Dates auto-calculated. Override rehearsal day or add special events.</div></div></div>${weeksHtml}</div>
  <div class="nav-row"><button class="btn btn-outline" onclick="goStep(1)">← Back</button><button class="btn btn-primary" onclick="goStep(3)">Next: Report Details →</button></div>`;
        }

        // ══════════════════════════════════════════
        // STEP 3
        // ══════════════════════════════════════════
        function renderStep3() {
            const teamHtml = state.teamMembers.map((m, i) => `<div class="list-item"><span class="list-num">${i + 1}</span><input type="text" value="${m}" placeholder="Member Name" onchange="state.teamMembers[${i}]=this.value;saveState()"><button class="btn btn-icon" onclick="rmItem('teamMembers',${i})">✕</button></div>`).join('');
            const goalsHtml = state.goals.map((g, i) => `<div class="list-item"><span class="list-num">${i + 1}</span><input type="text" value="${g}" placeholder="Goal" onchange="state.goals[${i}]=this.value;saveState()"><button class="btn btn-icon" onclick="rmItem('goals',${i})">✕</button></div>`).join('');
            return `
  <div class="glass fade-in"><div class="glass-header"><div class="glass-icon glass-icon-navy">👥</div><div><h2>Team Members</h2><div class="subtitle">Current serving members</div></div></div>
    <div style="margin-bottom:12px">${teamHtml}</div><button class="btn btn-ghost-add" onclick="addItem('teamMembers')">+ Add team member</button></div>
  <div class="glass fade-in"><div class="glass-header"><div class="glass-icon glass-icon-gold">🎯</div><div><h2>Departmental Goals — ${MONTHS[state.month]}</h2><div class="subtitle">Goals set for this month</div></div></div>
    <div style="margin-bottom:12px">${goalsHtml}</div><button class="btn btn-ghost-add" onclick="addItem('goals')">+ Add goal</button></div>
  <div class="glass fade-in"><div class="glass-header"><div class="glass-icon glass-icon-green">📱</div><div><h2>WhatsApp Integration</h2><div class="subtitle">Group link for sharing service updates</div></div></div>
    <div class="form-group"><label class="field-label">WhatsApp Group Link</label><input type="text" value="${state.whatsappGroup || ''}" placeholder="https://chat.whatsapp.com/..." onchange="state.whatsappGroup=this.value;saveState()"></div></div>
  <div class="glass fade-in"><div class="glass-header"><div class="glass-icon glass-icon-gold">💰</div><div><h2>Financial Figures</h2><div class="subtitle">End-of-month balances</div></div></div>
    <div class="form-row"><div class="form-group"><label class="field-label">Seed Account (₦)</label><input type="text" value="${state.seedBalance}" placeholder="e.g. 45,000" onchange="state.seedBalance=this.value"></div>
    <div class="form-group"><label class="field-label">Budget Account (₦)</label><input type="text" value="${state.budgetBalance}" placeholder="e.g. 120,000" onchange="state.budgetBalance=this.value"></div></div></div>
  <div class="glass fade-in"><div class="glass-header"><div class="glass-icon glass-icon-navy">📝</div><div><h2>Special Activities / Notes</h2><div class="subtitle">Notable events this month</div></div></div>
    <textarea placeholder="e.g. The department successfully coordinated..." onchange="state.specialActivities=this.value">${state.specialActivities}</textarea></div>
  <div class="nav-row"><button class="btn btn-outline" onclick="goStep(2)">← Back</button><button class="btn btn-primary" onclick="goStep(4)">Next: Roster →</button></div>`;
        }

        // ══════════════════════════════════════════
        // STEP 4 — ROSTER
        // ══════════════════════════════════════════
        function renderStep4() {
            const members = getActiveMembers(), opts = members.map(m => `<option value="${m}">${m}</option>`).join('');
            const rows = state.roles.map((r, i) => `<tr><td><span class="role-badge">${r.code}</span></td><td style="font-size:12px">${r.name}</td>
        <td><select onchange="state.roles[${i}].primary=this.value;saveState()"><option value="">—</option>${opts}</select></td>
        <td><select onchange="state.roles[${i}].alt1=this.value;saveState()"><option value="">—</option>${opts}</select></td>
        <td><select onchange="state.roles[${i}].alt2=this.value;saveState()"><option value="">—</option>${opts}</select></td></tr>`).join('');

            const mkEd = (type, title) => {
                const items = state.checklists[type] || [];
                const rows = items.map((it, i) => `
                    <div class="list-item" style="padding:8px">
                        <input type="text" value="${it.task}" placeholder="Task name..." onchange="state.checklists.${type}[${i}].task=this.value;saveState()" style="flex:2">
                        <input type="text" value="${it.cat || ''}" placeholder="Category (PWR etc)" onchange="state.checklists.${type}[${i}].cat=this.value;saveState()" style="flex:1">
                        <button class="btn-icon" onclick="state.checklists.${type}.splice(${i},1);saveState();renderCurrent()">✕</button>
                    </div>`).join('');
                return `<div class="glass" style="margin-bottom:20px">
                    <div class="glass-header"><div class="glass-icon glass-icon-navy">📋</div><div><h2>${title}</h2></div></div>
                    ${rows}
                    <button class="btn btn-outline" style="margin-top:10px;font-size:11px" onclick="state.checklists.${type}.push({id:'cl'+Date.now(),task:'',cat:''});saveState();renderCurrent()">+ Add Item</button>
                </div>`;
            };

            const roleRows = state.roles.map((r, i) => `
                <div class="list-item" style="padding:10px;background:rgba(255,255,255,0.03)">
                    <div style="display:grid;grid-template-columns:80px 1fr auto;gap:12px;width:100%;align-items:center">
                        <input type="text" value="${r.code}" onchange="state.roles[${i}].code=this.value;saveState()" style="font-weight:700;color:var(--gold)">
                        <input type="text" value="${r.name}" onchange="state.roles[${i}].name=this.value;saveState()">
                        <button class="btn-icon" onclick="state.roles.splice(${i},1);saveState();renderCurrent()">✕</button>
                    </div>
                </div>`).join('');

            // Set selected values after render
            setTimeout(() => { document.querySelectorAll('.roster-grid select').forEach((s, idx) => { const ri = Math.floor(idx / 3), fi = ['primary', 'alt1', 'alt2'][idx % 3]; s.value = state.roles[ri]?.[fi] || ''; }); }, 0);

            return `
                <div class="glass fade-in">
                    <div class="glass-header"><div class="glass-icon glass-icon-navy">📋</div><div><h2>Role Assignments — ${MONTHS[state.month]}</h2><div class="subtitle">Assign primary + alternates</div></div></div>
                    ${members.length === 0 ? '<div class="alert alert-warn">Add team members in Step 3 first.</div>' :
                    `<div style="overflow-x:auto"><table class="roster-grid"><thead><tr><th>Code</th><th>Role</th><th>Primary</th><th>Alt 1</th><th>Alt 2</th></tr></thead><tbody>${rows}</tbody></table></div>`}
                </div>
                
                <div class="glass fade-in">
                    <div class="glass-header"><div class="glass-icon glass-icon-gold">🛡️</div><div><h2>Role Editor</h2><div class="subtitle">Edit departmental roles and codes</div></div></div>
                    ${roleRows}
                    <button class="btn btn-outline" style="margin-top:12px" onclick="state.roles.push({code:'',name:'',primary:'',alt1:'',alt2:''});saveState();renderCurrent()">+ Add Role</button>
                </div>
                ${mkEd('pre', 'Pre-Service Checklist Editor')}
                ${mkEd('in', 'In-Service Checklist Editor')}
                ${mkEd('post', 'Post-Service Checklist Editor')}
                
                <div class="nav-row"><button class="btn btn-outline" onclick="goStep(3)">← Back</button><button class="btn btn-primary" onclick="goStep(5)">Next: Performance →</button></div>`;
        }

        // ══════════════════════════════════════════
        // STEP 5 — PERFORMANCE
        // ══════════════════════════════════════════
        // Helper: cycle through perf values
        function cyclePerfToggle(m, dk, field) {
            const cycles = { attended: ['', 'Y', 'N'], onTime: ['', 'Ideal', 'Y', 'N'], dressCode: ['', 'Y', 'N'] };
            const opts = cycles[field] || ['', 'Y', 'N'];
            const cur = state.servicePerformance[m]?.[dk]?.[field] || '';
            const next = opts[(opts.indexOf(cur) + 1) % opts.length];
            setPerf(m, dk, field, next);
        }
        function renderStep5() {
            const members = getActiveMembers(), svcDates = getServiceDatesForRoster();
            const serviceOnly = svcDates.filter(s => s.label.toLowerCase().includes('sunday') || s.label.toLowerCase().includes('mid-week'));
            if (members.length === 0 || serviceOnly.length === 0) return `<div class="glass fade-in"><div class="alert alert-warn">Complete Steps 1-3 first.</div></div><div class="nav-row"><button class="btn btn-outline" onclick="goStep(4)">← Back</button><button class="btn btn-primary" onclick="goStep(6)">Next →</button></div>`;

            const spcRows = members.map(m => {
                const r = calcMemberScore(m, svcDates);
                const color = r.aggregate >= 80 ? 'var(--accent-green)' : r.aggregate >= 60 ? 'var(--gold)' : 'var(--accent-red)';
                return `<tr>
                    <td class="name-cell">${m}</td>
                    <td>${r.punc}</td>
                    <td>${r.dress}</td>
                    <td>${r.physical}</td>
                    <td>${r.online}</td>
                    <td>${r.duty}</td>
                    <td class="agg-cell" style="color:${color}">${r.aggregate}%</td>
                </tr>`;
            }).join('');

            const spcTable = `<div class="spirit-section-head" style="margin-top:0">Steward Performance Card (SPC) 100%</div>
                <div style="overflow-x:auto"><table class="spc-table">
                    <thead><tr>
                        <th style="text-align:left;padding-left:12px">Names</th>
                        <th>Punctuality</th>
                        <th>Dress Code</th>
                        <th>Physical Fellowship</th>
                        <th>Online Meetings</th>
                        <th>Duties</th>
                        <th>Aggregate (%)</th>
                    </tr></thead>
                    <tbody>${spcRows}</tbody>
                </table></div>`;

            // Render one card per member for manual overrides
            const memberCards = members.map(m => {
                const ms = m.replace(/'/g, "\\'");
                const rows = serviceOnly.map(s => {
                    const dk = dateKey(s.date);
                    const p = state.servicePerformance[m]?.[dk] || {};
                    const att = (state.memberAttendance[dk]?.entries || {})[m] || {};
                    const isPresent = p.attended === 'Y' || att.present;
                    const isAbsent = p.attended === 'N';
                    const attBg = isPresent ? '#059669' : isAbsent ? 'rgba(248,113,113,0.3)' : 'var(--bg-glass)';
                    const attColor = isPresent ? '#fff' : isAbsent ? 'var(--accent-red)' : 'var(--text-dim)';
                    const attLabel = isPresent ? '✓ Present' : isAbsent ? '✗ Absent' : '— Attend?';
                    const ot = p.onTime || '';
                    const otBg = ot === 'Ideal' ? 'rgba(212,168,67,0.3)' : ot === 'Y' ? 'rgba(96,165,250,0.2)' : ot === 'N' ? 'rgba(248,113,113,0.2)' : 'var(--bg-glass)';
                    const otColor = ot === 'Ideal' ? 'var(--gold)' : ot === 'Y' ? 'var(--accent-blue)' : ot === 'N' ? 'var(--accent-red)' : 'var(--text-dim)';
                    const otLabel = ot === 'Ideal' ? '★ Ideal' : ot === 'Y' ? '✓ On Time' : ot === 'N' ? '✗ Late' : '— Time?';
                    const dc = p.dressCode || '';
                    const dcBg = dc === 'Y' ? 'rgba(52,211,153,0.2)' : dc === 'N' ? 'rgba(248,113,113,0.2)' : 'var(--bg-glass)';
                    const dcColor = dc === 'Y' ? 'var(--accent-green)' : dc === 'N' ? 'var(--accent-red)' : 'var(--text-dim)';
                    const dcLabel = dc === 'Y' ? '✓ Dress OK' : dc === 'N' ? '✗ Dress ✗' : '— Dress?';
                    const isSun = s.label.includes('Sunday');
                    return `<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">
                      <div style="width:110px;flex-shrink:0">
                        <div style="font-size:10px;font-weight:700;color:${isSun ? 'var(--gold)' : 'var(--accent-blue)'}">${isSun ? '⛪ Sunday' : '🎵 Midweek'}</div>
                        <div style="font-size:10px;color:var(--text-muted)">${fmtDisplay(s.date)}</div>
                      </div>
                      <button onclick="cyclePerfToggle('${ms}','${dk}','attended')" title="Tap to cycle: Attend?" style="flex:1;background:${attBg};color:${attColor};border:1px solid transparent;border-radius:6px;padding:5px 4px;font-size:11px;font-weight:600;cursor:pointer;text-align:center">${attLabel}</button>
                      <button onclick="cyclePerfToggle('${ms}','${dk}','onTime')" title="Tap to cycle: On Time?" style="flex:1;background:${otBg};color:${otColor};border:1px solid transparent;border-radius:6px;padding:5px 4px;font-size:11px;font-weight:600;cursor:pointer;text-align:center">${otLabel}</button>
                      <button onclick="cyclePerfToggle('${ms}','${dk}','dressCode')" title="Tap to cycle: Dress Code?" style="flex:1;background:${dcBg};color:${dcColor};border:1px solid transparent;border-radius:6px;padding:5px 4px;font-size:11px;font-weight:600;cursor:pointer;text-align:center">${dcLabel}</button>
                    </div>`;
                }).join('');
                return `<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px">
                  <div style="font-weight:700;font-size:14px;margin-bottom:10px">${m}</div>
                  <div style="display:flex;gap:6px;font-size:9px;color:var(--text-muted);margin-bottom:6px;padding-left:118px">
                    <span style="flex:1;text-align:center;text-transform:uppercase;letter-spacing:.05em">Attendance</span>
                    <span style="flex:1;text-align:center;text-transform:uppercase;letter-spacing:.05em">On Time</span>
                    <span style="flex:1;text-align:center;text-transform:uppercase;letter-spacing:.05em">Dress Code</span>
                  </div>
                  ${rows}
                </div>`;
            }).join('');
            return `<div class="glass fade-in"><div class="glass-header"><div class="glass-icon glass-icon-navy">📊</div><div><h2>Steward Performance</h2><div class="subtitle">Objective automated scoring based on logs</div></div></div>
        ${spcTable}
        <div class="alert alert-info" style="margin-bottom:12px;font-size:11px">💡 <strong>Objective Scoring:</strong> Punctuality (20), Dress (20), Physical Mtg (20), Online Mtg (20), and Duties (20) aggregate to 100%. Use buttons below to manually override service-specific data.</div>
        ${memberCards}
      </div><div class="nav-row"><button class="btn btn-outline" onclick="goStep(4)">← Back</button><button class="btn btn-primary" onclick="goStep(6)">Next: Spiritual →</button></div>`;
        }

        // ══════════════════════════════════════════
        // STEP 6 — SPIRITUAL
        // ══════════════════════════════════════════
        function renderStep6() {
            const members = getActiveMembers(), nw = state.weeks.length || 5;
            if (members.length === 0) return `<div class="glass fade-in"><div class="alert alert-warn">Add team members first.</div></div><div class="nav-row"><button class="btn btn-outline" onclick="goStep(5)">← Back</button><button class="btn btn-primary" onclick="goStep(7)">Next →</button></div>`;
            const mkTable = (activity, title) => {
                const wkHdrs = Array.from({ length: nw }, (_, i) => `<th>Week ${i + 1}</th>`).join('');
                const rows = members.map(m => {
                    if (!state.spiritualActivities[m]) state.spiritualActivities[m] = { friday: Array(nw).fill(''), saturday: Array(nw).fill('') };
                    const sa = state.spiritualActivities[m][activity] || Array(nw).fill('');
                    while (sa.length < nw) sa.push('');
                    const total = sa.filter(v => v === 'Y').length;
                    const cells = sa.map((v, wi) => `<td>
                        <button onclick="toggleSpirit('${m.replace(/'/g, "\\'")}','${activity}',${wi})"

                    return `<tr><td class="name-cell" style="padding:8px 12px;border-bottom:1px solid var(--border)">${m}</td>${cells}<td style="text-align:center;font-weight:700;color:var(--accent-green);border-bottom:1px solid var(--border)">${total}/${nw}</td></tr>`;
                }).join('');
                return `<div class="spirit-section-head">${title}</div>
                    <div style="overflow-x:auto"><table class="spc-table" style="margin-bottom:20px">

            return `<div class="glass fade-in"><div class="glass-header"><div class="glass-icon glass-icon-green">🙏</div><div><h2>Spiritual Activities</h2><div class="subtitle">Track Friday Physical & Saturday Online Attendance</div></div></div>

        }
        function toggleSpirit(m, act, wi) {
            const cur = state.spiritualActivities[m][act][wi] || '';

            setSpiritActivity(m, act, wi, next);
        }

        function addItem(key) { if (!state[key]) state[key] = []; state[key].push({}); saveState(); renderCurrent(); }
        function rmItem(key, idx) { if (confirm('Remove this item?')) { state[key].splice(idx, 1); saveState(); renderCurrent(); } }

        // ══════════════════════════════════════════
        // STEP 7 — MEETINGS
        // ══════════════════════════════════════════
        function renderStep7() {
            const mtgs = state.meetingMinutes || [];

            const rows = mtgs.map((m, i) => {
                const cert = state.certifiedLog?.[`mtg_${i}`];
                return `
                <div class="glass" style="margin-bottom:12px;padding:16px;border-left:4px solid var(--gold);${cert ? 'opacity:0.8' : ''}">
                    <div style="display:flex;justify-content:space-between;margin-bottom:10px">
                        <input type="text" value="${m.title || ''}" ${cert ? 'disabled' : ''} placeholder="Meeting Title" onchange="state.meetingMinutes[${i}].title=this.value;saveState()" style="font-weight:700;background:transparent;border:none;padding:0;font-size:15px;width:70%;color:var(--gold)">
                        <input type="date" value="${m.date || ''}" ${cert ? 'disabled' : ''} onchange="state.meetingMinutes[${i}].date=this.value;saveState()" style="width:120px;font-size:11px">
                    </div>
                    <div class="form-group"><label class="field-label">Agenda (one per line)</label>
                        <textarea onchange="state.meetingMinutes[${i}].agenda=this.value;saveState()" ${cert ? 'disabled' : ''} style="min-height:60px">${m.agenda || ''}</textarea></div>
                    <div class="form-group" style="margin-top:10px"><label class="field-label">Minutes / Resolutions</label>
                        <textarea onchange="state.meetingMinutes[${i}].minutes=this.value;saveState()" ${cert ? 'disabled' : ''} style="min-height:80px">${m.minutes || ''}</textarea></div>
                    
                    <div style="margin-top:10px;display:flex;justify-content:space-between;align-items:center">
                        ${cert
                        ? `<div style="font-size:10px;color:var(--accent-green);font-weight:700">✅ Minute Taker: ${cert.name}</div>`
                        : `<div style="display:flex;gap:8px;align-items:center"><label style="font-size:10px;color:var(--text-muted)">Minute Taker:</label>
                               <select id="mtgCert-${i}" style="font-size:11px;padding:4px;width:120px">${members.map(nm => `<option value="${nm}">${nm}</option>`).join('')}</select>
                               <button class="btn btn-primary" style="padding:4px 8px;font-size:10px" onclick="certifyMeeting(${i}, document.getElementById('mtgCert-${i}').value)">Certify Minutes</button></div>`
                    }
                        <button class="btn btn-outline" style="font-size:10px;padding:4px 8px;border-color:rgba(212,168,67,0.3)" ${cert ? 'disabled' : ''} onclick="rmItem('meetingMinutes',${i})">Remove Meeting</button>

            </div><div class="nav-row"><button class="btn btn-outline" onclick="goStep(6)">← Back</button><button class="btn btn-primary" onclick="goStep(8)">Next: Expenses →</button></div>`;
        }


        // ══════════════════════════════════════════
        // STEP 8 — EXPENSES
        // ══════════════════════════════════════════
        function addExpense() {
            state.expenses.push({ id: Date.now(), date: '', desc: '', type: 'expense', amount: 0 });
            renderCurrent();
        }
        function removeExpense(id) {
            state.expenses = state.expenses.filter(e => e.id !== id);
            renderCurrent();
            saveState();
        }

            const members = getActiveMembers();
            const rows = state.expenses.map((ex, i) => {
                const cert = state.certifiedLog?.[`ex_${ex.id}`];
                return `
                <div class="ex-row" style="${cert ? 'opacity:0.8' : ''}">
                    <input type="date" value="${ex.date}" ${cert ? 'disabled' : ''} onchange="state.expenses[${i}].date=this.value;saveState()">
                    <input type="text" value="${ex.desc}" ${cert ? 'disabled' : ''} placeholder="Description" onchange="state.expenses[${i}].desc=this.value;saveState()">

                            <button class="btn-ghost-add" style="padding:4px;font-size:10px" onclick="if(confirm('Certify this entry?')) certifyExpense(${ex.id}, document.getElementById('exCert-${ex.id}').value)">Certify</button>
                           </div>`
                    }
                    <button onclick="removeExpense(${ex.id})" ${cert ? 'disabled' : ''} style="background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;opacity:${cert ? 0.3 : 1}">🗑️</button>

            const totalExp = state.expenses.reduce((s, e) => s + (e.type === 'expense' ? e.amount : -e.amount), 0);
            return `<div class="glass fade-in"><div class="glass-header"><div class="glass-icon glass-icon-gold">💳</div><div><h2>Departmental Expenses</h2><div class="subtitle">Track monthly spend and refund requests</div></div></div>
                <div style="margin-bottom:16px">${state.expenses.length === 0 ? '<div class="alert alert-info" style="font-size:11px">No expenses recorded yet. click "Add Item" to start.</div>' : rows}</div>
                <div style="display:flex;justify-content:space-between;align-items:center;padding:12px;background:var(--bg-glass);border-radius:var(--radius-sm);border:1px dashed var(--border)">
                    <button class="btn btn-outline" onclick="addExpense()">+ Add Item</button>

                        <div style="font-size:10px;color:var(--text-muted);text-transform:uppercase">Net Total Spent</div>

                    </div>

            </div><div class="nav-row"><button class="btn btn-outline" onclick="goStep(7)">← Back</button><button class="btn btn-primary" onclick="goStep(9)">Next: Generate →</button></div>`;
        }

        // ══════════════════════════════════════════
        // STEP 9 — REPORT (OPERATIONS)
        // ══════════════════════════════════════════

        // ══════════════════════════════════════════

        function renderStep9() {

                <div class="gen-btns">
                    <button class="btn btn-gen-excel" onclick="generateExcel()">📊 Export Budget (Excel)</button>
                    <button class="btn btn-gen-word" onclick="generateWord()">📄 Activity Report (Word)</button>
                </div>
            </div>
            
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px" class="db-grid-mobile">
                <div class="glass fade-in" style="margin-bottom:0">

                    <button class="btn btn-primary" style="margin-top:16px;width:100%" onclick="jsonbinPush().then(()=>showToast('☁️ Synced to JSONBin'))">Push to Cloud</button>
                </div>
                
                <div class="glass fade-in" style="margin-bottom:0">

                    <textarea style="font-family:monospace;font-size:11px;height:115px;width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px" 
                        onchange="try{state.firebaseConfig=JSON.parse(this.value);initFirebase();saveState();showToast('🔥 Firebase Config Updated');}catch(e){alert('Invalid JSON config');}">${state.firebaseConfig ? JSON.stringify(state.firebaseConfig, null, 2) : ''}</textarea>

        }

        // ══════════════════════════════════════════
        // EVENT HANDLERS
        // ══════════════════════════════════════════
        function overrideReh(wi, val) { state.weeks[wi].rehDayOverride = val === '' ? null : parseInt(val); const wk = state.weeks[wi]; wk.rehDate = getRehDate(wk.sunday, wk.rehDayOverride ?? state.defaultRehDay); renderCurrent(); }
        function addSpecial(wi) { state.weeks[wi].specials.push({ name: '', date: '', hours: 3, fuelType: 'petrol', litresPerHour: 2.5 }); saveState(); renderCurrent(); }
        function rmSpecial(wi, ei) { state.weeks[wi].specials.splice(ei, 1); renderCurrent(); }
        function addItem(key) { state[key].push(''); renderCurrent(); }
        function rmItem(key, i) { state[key].splice(i, 1); renderCurrent(); }
        function goStep(n) { state.step = n; saveState(); renderCurrent(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        function goStep2() { computeWeeks(); state.step = 2; saveState(); renderCurrent(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        function setPerf(member, dk, field, val) { if (!state.servicePerformance[member]) state.servicePerformance[member] = {}; if (!state.servicePerformance[member][dk]) state.servicePerformance[member][dk] = {}; state.servicePerformance[member][dk][field] = val; saveState(); }
        function setSpiritActivity(member, activity, weekIdx, val) { if (!state.spiritualActivities[member]) state.spiritualActivities[member] = { friday: Array(5).fill(''), saturday: Array(5).fill('') }; state.spiritualActivities[member][activity][weekIdx] = val; saveState(); }

        function certifyService(dk, name) {
            if (!name) return alert('Please select a steward name to certify.');
            if (!state.certifiedLog) state.certifiedLog = {};
            state.certifiedLog[dk] = { name, time: new Date().toISOString() };
            if (state.memberAttendance[dk]) state.memberAttendance[dk].locked = true;
            saveState(); renderDrawer(dk);
        }
        function certifyExpense(id, name) {
            if (!name) return alert('Please select a name.');
            if (!state.certifiedLog) state.certifiedLog = {};
            state.certifiedLog['ex_' + id] = { name, time: new Date().toISOString() };
            saveState(); renderCurrent();
        }
        function certifyMeeting(i, name) {
            if (!name) return alert('Please select a name.');
            if (!state.certifiedLog) state.certifiedLog = {};
            state.certifiedLog['mtg_' + i] = { name, time: new Date().toISOString() };
            saveState(); renderCurrent();
        }

        // ══════════════════════════════════════════
        // SERVICE DRAWER
        // ══════════════════════════════════════════
        function openDrawer(targetDk) {
            document.getElementById('serviceDrawer').classList.add('open');
            document.getElementById('drawerOverlay').classList.add('open');
            // Auto-detect the most relevant service date if none specified
            if (!targetDk) {
                const svcDates = getServiceDatesForRoster();
                if (svcDates.length > 0) {
                    const now = new Date();
                    const today = now.toISOString().slice(0, 10);
                    // 1. Prefer a service happening TODAY
                    let best = svcDates.find(s => dateKey(s.date) === today);
                    if (!best) {
                        // 2. Next upcoming service
                        best = svcDates.find(s => new Date(s.date) >= now);
                    }
                    if (!best) {
                        // 3. Most recent past service
                        best = svcDates[svcDates.length - 1];
                    }
                    if (best) targetDk = dateKey(best.date);
                }
            }
            renderDrawer(targetDk);
        }
        function closeDrawer() { document.getElementById('serviceDrawer').classList.remove('open'); document.getElementById('drawerOverlay').classList.remove('open'); }
        function renderDrawer(targetDk) {
            const svcDates = getServiceDatesForRoster(), members = getActiveMembers(), mo = MONTHS[state.month], yr = state.year;
            if (svcDates.length === 0) { document.getElementById('drawerBody').innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-dim)"><div style="font-size:32px;margin-bottom:12px">📋</div><p style="font-size:13px">Complete Steps 1 & 2 first.</p></div>`; return; }
            const logsHtml = svcDates.map(svc => {
                const dk = dateKey(svc.date);
                const att = state.memberAttendance[dk] || { locked: false, entries: {} };
                const sl = state.serviceLog[dk] || {};
                const isLocked = att.locked;
                const isSun = svc.label.includes('Sunday');
                const memberEntries = members.map(m => {
                    const entry = att.entries[m] || { present: false, arrivalTime: '' };
                    const ms = m.replace(/'/g, "\\'");
                    const taskVal = entry.taskNotes || '';
                    return `<div style="padding:8px 0;border-bottom:1px solid var(--border)">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
                <div style="flex:1;font-size:13px;font-weight:600">${m}</div>
                <input type="time" value="${entry.arrivalTime}" title="Arrival time (WAT)" style="width:80px;padding:4px 6px;font-size:11px;border-radius:6px;border:1px solid var(--border);background:var(--bg-glass);color:var(--text)" ${isLocked ? 'disabled' : `onchange="saveAttendance('${dk}','${ms}','arrivalTime',this.value)"`}>
                <button onclick="togglePresent('${dk}','${ms}')" ${isLocked ? 'disabled' : ''} style="background:${entry.present ? 'var(--accent-green)' : 'var(--bg-glass)'};color:${entry.present ? '#fff' : 'var(--text-dim)'};border:1px solid ${entry.present ? 'var(--accent-green)' : 'var(--border)'};padding:5px 10px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer">${entry.present ? 'Present' : 'Absent'}</button>
              </div>
              <input type="text" value="${taskVal}" placeholder="What ${m.split(' ')[0]} did this service..." style="width:100%;font-size:11px;color:var(--text-dim);background:transparent;border:none;border-bottom:1px dashed var(--border);padding:3px 0;outline:none" ${isLocked ? 'disabled' : `onblur="saveAttendance('${dk}','${ms}','taskNotes',this.value)"`}>
            </div>`;
                }).join('');
                const logFields = `
              <div style="margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.08)">
                <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:8px">Service Report</div>
                <div style="margin-bottom:8px">
                  <label style="font-size:10px;color:var(--text-muted);display:block;margin-bottom:3px">ISSUES ENCOUNTERED</label>
                  <textarea rows="2" style="width:100%;font-size:12px;background:var(--bg-glass);border:1px solid var(--border);border-radius:6px;padding:6px;color:var(--text);resize:vertical" placeholder="Any issues, faults or challenges..." ${isLocked ? 'disabled' : `onblur="saveLog('${dk}','issues',this.value)"`}>${sl.issues || ''}</textarea>
                </div>
                <div style="margin-bottom:8px">
                  <label style="font-size:10px;color:var(--text-muted);display:block;margin-bottom:3px">RECOMMENDATIONS</label>
                  <textarea rows="2" style="width:100%;font-size:12px;background:var(--bg-glass);border:1px solid var(--border);border-radius:6px;padding:6px;color:var(--text);resize:vertical" placeholder="Suggestions for improvement..." ${isLocked ? 'disabled' : `onblur="saveLog('${dk}','recommendations',this.value)"`}>${sl.recommendations || ''}</textarea>
                </div>
                <div>
                  <label style="font-size:10px;color:var(--text-muted);display:block;margin-bottom:3px">SERVICE REPORT / NOTES</label>
                  <textarea rows="2" style="width:100%;font-size:12px;background:var(--bg-glass);border:1px solid var(--border);border-radius:6px;padding:6px;color:var(--text);resize:vertical" placeholder="Overall service notes and observations..." ${isLocked ? 'disabled' : `onblur="saveLog('${dk}','report',this.value)"`}>${sl.report || ''}</textarea>
                </div>
              </div>`;
                const cert = state.certifiedLog?.[dk];
                const certHtml = cert
                    ? `<div style="margin-top:12px;padding:8px;background:rgba(52,211,153,0.1);border:1px solid var(--accent-green);border-radius:6px;display:flex;align-items:center;gap:8px">
                        <span style="font-size:18px">✅</span>
                        <div><div style="font-size:11px;font-weight:700;color:var(--accent-green)">CERTIFIED REPORT</div>
                        <div style="font-size:10px;color:var(--text-dim)">By ${cert.name} on ${new Date(cert.time).toLocaleString()}</div></div>
                       </div>`
                    : `<div style="margin-top:12px;padding:12px;background:var(--bg-glass);border:1px dashed var(--border);border-radius:6px">
                        <div style="font-size:10px;font-weight:700;color:var(--gold);margin-bottom:8px;text-transform:uppercase">Verify & Certify Report</div>
                        <div style="display:flex;gap:8px">
                            <select id="certName-${dk}" style="font-size:11px;padding:6px">${members.map(m => `<option value="${m}">${m}</option>`).join('')}</select>
                            <button class="btn btn-primary" style="padding:6px 12px;font-size:11px" onclick="certifyService('${dk}', document.getElementById('certName-${dk}').value)">Certify</button>
                        </div>
                        <div style="font-size:9px;color:var(--text-muted);margin-top:6px">Note: Certification locks this report for non-admins.</div>
                       </div>`;

                const mkChecklistSection = (type, title) => {
                    const items = state.checklists[type] || [];
                    if (items.length === 0) return '';
                    const memberOpts = members.map(m => `<option value="${m}">${m.split(' ')[0]}</option>`).join('');
                    const checklistItems = items.map(item => {
                        const log = state.checklistLogs[dk]?.[item.id];
                        const isChecked = log && log.done;
                        const byWho = isChecked ? log.by : '';
                        const atTime = isChecked ? new Date(log.at).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) : '';
                        return `<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
                            <div style="display:flex;align-items:center;gap:10px">
                                <input type="checkbox" id="cl-${dk}-${item.id}" ${isChecked ? 'checked' : ''} ${isLocked ? 'disabled' : ''}
                                    onchange="toggleChecklistWithName('${dk}','${item.id}',this.checked,document.getElementById('clname-${dk}-${item.id}').value)"
                                    style="width:16px;height:16px;cursor:pointer;flex-shrink:0">
                                <div style="flex:1">
                                    <div style="font-size:12px;color:${isChecked ? 'var(--text-dim)' : 'var(--text)'};text-decoration:${isChecked ? 'line-through' : 'none'}">${item.task}</div>
                                    <div style="font-size:9px;color:var(--gold);opacity:0.8">${item.time || ''} · <strong>${item.cat || ''}</strong></div>
                                </div>
                                ${isChecked
                                ? `<div style="text-align:right;font-size:9px;color:var(--accent-green);line-height:1.4">✓ <strong>${byWho}</strong><br>${atTime}</div>`
                                : `<select id="clname-${dk}-${item.id}" style="font-size:10px;padding:3px 6px;width:90px;flex-shrink:0">${memberOpts}</select>`
                            }
                            </div>
                        </div>`;
                    }).join('');
                    const total = items.length;
                    const done = items.filter(item => state.checklistLogs[dk]?.[item.id]?.done).length;
                    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
                    return `<div style="margin-top:16px">

                        let html = `<p style="font-size:10pt;font-weight:bold;margin-top:8px">Operational Checklist — ${totalDone}/${allItems.length} completed</p>`;
                        sections.forEach(sec => {
                            const doneItems = sec.items.filter(item => logs[item.id]?.done);
                            if (doneItems.length === 0) return;
                            html += `<p style="font-size:9pt;font-weight:bold;margin:6px 0 2px;color:#b8860b">${sec.label}:</p>
                            <table style="width:100%;font-size:8pt;border-collapse:collapse">
                            <tr style="background:#f9f9f9"><th style="text-align:left;padding:3px 6px;border:1px solid #ddd">Task</th><th style="padding:3px 6px;border:1px solid #ddd">Category</th><th style="padding:3px 6px;border:1px solid #ddd">Completed By</th><th style="padding:3px 6px;border:1px solid #ddd">Time</th></tr>
                            ${doneItems.map(item => {
                                const log = logs[item.id];
                                const atTime = log.at ? new Date(log.at).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) : '—';
                                return `<tr><td style="padding:3px 6px;border:1px solid #eee">${item.task}</td><td style="padding:3px 6px;border:1px solid #eee;text-align:center">${item.cat || '—'}</td><td style="padding:3px 6px;border:1px solid #eee;color:#059669;font-weight:bold">${log.by || '—'}</td><td style="padding:3px 6px;border:1px solid #eee;text-align:center">${atTime} WAT</td></tr>`;
                            }).join('')}
                            </table>`;
                        });
                        return html;
                    })();
                    const isSun = dk.includes('Sun');
                    const attTable = presentNames.length > 0 ? `<ul>${presentNames.map(name => `<li>${name}</li>`).join('')}</ul>` : '<p style="font-size:9pt;color:#ef4444"><i>No attendance recorded.</i></p>';

                    return `<div style="margin-bottom:20pt;padding-bottom:10pt;border-bottom:1px dashed #eee"><h3>${isSun ? '⛪' : '🎵'} ${svc.label}</h3>${certBadge}${clHtml}<p><strong>Steward Attendance:</strong></p>${attTable}<p><strong>Issues:</strong> ${sl.issues || 'None'}</p><p><strong>Recommendations:</strong> ${sl.recommendations || 'None'}</p><p><strong>Notes:</strong> ${sl.report || 'None'}</p></div>`;
                }).join('');
                return `<h2>Service-by-Service Report</h2><div class="service-report-container">${rows}</div>`;
            })();
            // Performance Section
            const perfSection = (() => {
                if (members.length === 0) return '';
                const perfRows = members.map(m => {
                    const r = calcMemberScore(m, svcDates);
                    const col = r.aggregate >= 80 ? '#155724' : r.aggregate >= 60 ? '#856404' : '#842029';
                    const bg = r.aggregate >= 80 ? '#d4edda' : r.aggregate >= 60 ? '#fff3cd' : '#f8d7da';
                    return `<tr>
                        <td>${m}</td>
                        <td style="text-align:center">${r.punc}</td>
                        <td style="text-align:center">${r.dress}</td>
                        <td style="text-align:center">${r.physical}</td>
                        <td style="text-align:center">${r.online}</td>
                        <td style="text-align:center">${r.duty}</td>
                        <td style="text-align:center"><strong style="color:${col};background:${bg};padding:2pt 6pt;border-radius:3pt">${r.aggregate}%</strong></td>
                    </tr>`;
                }).join('');
                return `<h2>Steward Performance Card (SPC) 100%</h2><table class="wide-table"><thead><tr><th>Names</th><th style="text-align:center">Punc</th><th style="text-align:center">Dress</th><th style="text-align:center">Phys</th><th style="text-align:center">Onl</th><th style="text-align:center">Duty</th><th style="text-align:center">Agg.</th></tr></thead><tbody>${perfRows}</tbody></table>`;
            })();
            // Expense Section
            const expenseSection = (() => {
                if (state.expenses.length === 0) return '';
                const rows = state.expenses.map(ex => {
                    const cert = state.certifiedLog?.['ex_' + ex.id];
                    const certTxt = cert ? ` <span style="font-size:7pt;color:#059669">(Verified: ${cert.name.split(' ')[0]})</span>` : '';
                    return `<tr><td>${ex.date}</td><td>${ex.desc}${certTxt}</td><td>${ex.type.toUpperCase()}</td><td style="text-align:right">₦${ex.amount.toLocaleString()}</td></tr>`;
                }).join('');
                const total = state.expenses.reduce((s, e) => s + (e.type === 'expense' ? e.amount : -e.amount), 0);
                return `<h2>Departmental Expense Report</h2><table class="wide-table"><thead><tr><th>Date</th><th>Description</th><th>Type</th><th style="text-align:right">Amount</th></tr></thead><tbody>${rows}</tbody><tfoot><tr><th colspan="3" style="text-align:right">Net Total</th><th style="text-align:right">₦${total.toLocaleString()}</th></tr></tfoot></table>`;
            })();
            const meetingsSection = (() => {
                const mtgs = state.meetingMinutes || [];
                if (mtgs.length === 0) return '';
                const mtgHtml = mtgs.map((mtg, i) => {
                    const cert = state.certifiedLog?.['mtg_' + i];
                    const certBadge = cert ? `<p style="font-size:9pt;color:#059669;font-weight:bold">✅ Recorded & Verified by ${cert.name}</p>` : '';
                    const agendaItems = (mtg.agenda || '').split('\n').filter(l => l.trim()).map(l => `<li>${l}</li>`).join('');
                    const minuteItems = (mtg.minutes || '').split('\n').filter(l => l.trim()).map(l => `<p>${l}</p>`).join('');
                    return `<h3>${mtg.title || `Meeting ${i + 1}`} — ${mtg.date || ''}</h3>${certBadge}<p><strong>Agenda:</strong></p><ul>${agendaItems}</ul><p><strong>Minutes:</strong></p>${minuteItems}`;
                }).join('');
                return `<h2>Meetings & Minutes</h2>${mtgHtml}`;
            })();
            const html = `<html><head><meta charset="UTF-8"><style>
                body { font-family: 'Calibri', 'Inter', sans-serif; font-size: 11pt; line-height: 1.3; color: #333; }
                h1 { color: #1a2a4a; font-size: 18pt; margin-bottom: 4pt; border-bottom: 2pt solid #d4a843; }
                h2 { color: #1a3260; font-size: 14pt; margin-top: 18pt; margin-bottom: 8pt; border-left: 4pt solid #d4a843; padding-left: 8pt; }
                h3 { font-size: 12pt; color: #444; margin-top: 10pt; }
                table { width: 100%; border-collapse: collapse; margin-bottom: 12pt; table-layout: fixed; }
                th, td { border: 1px solid #ddd; padding: 6pt; font-size: 10pt; word-wrap: break-word; vertical-align: top; }
                th { background: #f8f9fa; font-weight: bold; text-align: left; }
                .wide-table th, .wide-table td { font-size: 9pt; padding: 4pt; }
                .footer { font-size: 9pt; color: #777; margin-top: 30pt; border-top: 1px solid #ddd; padding-top: 10pt; }
                @page { margin: 0.9cm; }
            </style></head><body>
                <h1>CIRCUIT DEPARTMENTAL MONTHLY REPORT</h1>
                <p style="font-size:12pt"><strong>${mo.toUpperCase()} ${yr}</strong> — ${state.teamMembers.length} Stewards active</p>
                <div style="margin-top:20pt">
                    <h2>Budget Overview</h2>
                    <p>Departmental Budget: <strong>₦${grandTotal.toLocaleString()}</strong></p>
                    <p>Seed Balance: <strong>₦${state.seedBalance || '0'}</strong></p>
                    <p>Budget Account Balance: <strong>₦${state.budgetBalance || '0'}</strong></p>
                </div>
                <div><h2>Departmental Goals</h2><ul>${goalsLi}</ul></div>
                ${perfSection}${spiritSection}${expenseSection}${rosterSection}${svcLogSection}${meetingsSection}
                <div class="footer"><p>Generated on ${new Date().toLocaleDateString()} · NRCC Circuit Department Hub</p></div>
            </body></html>`;
            const blob = new Blob([html], { type: 'application/msword' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `NRCC Circuit Report - ${mo} ${yr}.doc`; a.click(); URL.revokeObjectURL(url);
        }

        // ══════════════════════════════════════════
        // MINISTER DASHBOARD
        // ══════════════════════════════════════════
        function renderMinisterDashboard() {
            try {
                const mo = MONTHS[state.month] || 'Month', yr = state.year || 2026, members = getActiveMembers(), svcDates = getServiceDatesForRoster();
                const D = parseFloat(state.dieselPrice) || 1000, P = parseFloat(state.petrolPrice) || 845;
                const rehCPH = ceil10(2.5 * P);

                let grandTotal = 0;
                (state.weeks || []).forEach(wk => {
                    grandTotal += (12 * D * 2.5) + (12 * D * 4) + (rehCPH * 3);
                    (wk.specials || []).forEach(ev => {
                        const lph = parseFloat(ev.litresPerHour) || 2.5;
                        const ft = ev.fuelType || 'petrol';
                        const hrs = parseFloat(ev.hours) || 3;
                        grandTotal += ceil10(lph * (ft === 'diesel' ? D : P)) * hrs;
                    });
                });

                let totalPresent = 0, totalPossible = 0;
                svcDates.forEach(svc => {
                    const dk = dateKey(svc.date);
                    const att = state.memberAttendance[dk] || { entries: {} };
                    const entries = att.entries || {};
                    totalPresent += Object.values(entries).filter(e => e && e.present).length;
                    totalPossible += members.length;
                });

                const attPct = totalPossible > 0 ? Math.round((totalPresent / totalPossible) * 100) : 0;
                const avgScore = members.length > 0 ? Math.round(members.reduce((s, m) => s + (calcMemberScore(m, svcDates).aggregate || 0), 0) / members.length) : 0;

                const scorecards = members.map(m => {
                    const res = calcMemberScore(m, svcDates);
                    const sc = res.aggregate || 0;
                    const c = sc >= 80 ? 'sc-a' : sc >= 60 ? 'sc-b' : 'sc-c';
                    return `<div class="score-card fade-in"><div class="sc-name">${m.split(' ')[0]}</div><div class="sc-score ${c}">${sc}%</div><div class="sc-label">Performance</div></div>`;
                }).join('') || '<div style="grid-column:1/-1;text-align:center;color:var(--text-muted);padding:20px">No members found</div>';

                const commentsHtml = (state.ministerComments || []).map(c => `
                    <div class="comment-bubble ${c.from} fade-in">
                        <div>${c.text}</div>
                        <div class="comment-meta">${c.from === 'minister' ? '👑 Minister' : '🔧 Admin'} · ${new Date(c.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
                    </div>`).join('') || '<div style="text-align:center;color:var(--text-muted);padding:20px;font-size:12px">No comments yet</div>';

                const activityItems = (state.activityLog || []).slice(0, 15);
                const feedHtml = activityItems.map(a => `
                    <div class="feed-item fade-in">
                        <div class="feed-dot" style="background:${a.action === 'certify' ? 'var(--accent-green)' : 'var(--gold)'}"></div>
                        <div style="flex:1">
                            <div style="color:var(--text)">${a.detail || a.action}</div>
                            <div class="feed-time">${new Date(a.time).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</div>
                        </div>
                    </div>`).join('') || '<div style="text-align:center;color:var(--text-muted);padding:20px;font-size:12px">No recent activity</div>';

                return `
                <div class="kpi-grid fade-in">
                    <div class="kpi"><div class="kpi-val">${attPct}%</div><div class="kpi-lbl">Attendance</div><div class="kpi-sub">${totalPresent}/${totalPossible} check-ins</div></div>
                    <div class="kpi"><div class="kpi-val">₦${(grandTotal / 1000).toLocaleString(undefined, { maximumFractionDigits: 0 })}k</div><div class="kpi-lbl">Budget</div><div class="kpi-sub">${mo} ${yr}</div></div>
                    <div class="kpi"><div class="kpi-val">${members.length}</div><div class="kpi-lbl">Members</div><div class="kpi-sub">Active team</div></div>
                    <div class="kpi"><div class="kpi-val">${avgScore}%</div><div class="kpi-lbl">Avg Score</div><div class="kpi-sub">Department Performance</div></div>
                </div>

                <div class="glass fade-in">
                    <div class="glass-header"><div class="glass-icon glass-icon-gold">📊</div><div><h2>Performance Overview</h2><div class="subtitle">Individual member aggregate scores</div></div></div>
                    <div class="score-cards">${scorecards}</div>
                </div>

                <div style="display:grid;grid-template-columns:1.5fr 1fr;gap:20px" class="db-grid-mobile">
                    <div class="glass fade-in">
                        <div class="glass-header"><div class="glass-icon glass-icon-navy">💬</div><div><h2>Feedback & Comments</h2><div class="subtitle">Communicate with your department heads</div></div></div>
                        <div class="minister-comment-thread" id="commentThread">${commentsHtml}</div>
                        <div style="display:flex;gap:8px;margin-top:16px"><input type="text" id="ministerCommentInput" placeholder="Type a message..." style="flex:1">
                            <button class="btn btn-primary" onclick="postMinisterComment()">Send</button></div>
                    </div>
                    <div class="glass fade-in">
                        <div class="glass-header"><div class="glass-icon glass-icon-green">📡</div><div><h2>Live Activity</h2><div class="subtitle">Real-time update stream</div></div></div>
                        <div class="activity-feed">${feedHtml}</div>
                    </div>
                </div>

                <div class="glass fade-in">
                    <div class="glass-header"><div class="glass-icon glass-icon-navy">📥</div><div><h2>Report Downloads</h2><div class="subtitle">Download historical data for this month</div></div></div>
                    <div style="display:flex;gap:12px;flex-wrap:wrap">
                        <button class="btn btn-outline" style="border-color:var(--accent-blue);color:var(--accent-blue)" onclick="generateExcel()">📊 Monthly Budget (Excel)</button>
                        <button class="btn btn-primary" onclick="generateWord()">📄 Full Activity Report (Word)</button>
                    </div>
                </div>`;
            } catch (e) {
                console.error("Dashboard Error:", e);
                return `<div class="alert alert-error">Error loading dashboard: ${e.message}</div>`;
            }
        }

        function postMinisterComment() {
            const input = document.getElementById('ministerCommentInput');
            if (!input || !input.value.trim()) return;
            if (!state.ministerComments) state.ministerComments = [];
            state.ministerComments.push({ from: state.currentView === 'minister' ? 'minister' : 'admin', text: input.value.trim(), time: new Date().toISOString() });
            input.value = ''; saveState(); renderCurrent();
        }

        // ══════════════════════════════════════════
        // MAIN RENDER
        // ══════════════════════════════════════════
        function renderCurrent() {
            const root = document.getElementById('appRoot');
            const adminBtn = document.getElementById('adminBtn');

            if (state.currentView === 'minister') {
                adminBtn.innerHTML = '🔓 Exit'; adminBtn.className = 'g-btn';
                root.innerHTML = `<div class="main-content" style="max-width:960px;margin:0 auto">
              <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;padding:16px;background:linear-gradient(135deg,rgba(212,168,67,0.1),transparent);border-radius:var(--radius);border:1px solid var(--border-gold)">
                <span style="font-size:28px">👑</span><div><h2 style="font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);margin:0">Minister's Dashboard</h2><div style="font-size:11px;color:var(--text-dim)">${MONTHS[state.month]} ${state.year} · Real-time Overview</div></div>
              </div>${renderMinisterDashboard()}</div>`;
                return;
            }

            if (state.currentView === 'admin') {
                adminBtn.innerHTML = '🔓 Logout'; adminBtn.className = 'g-btn';
                const sidebarHtml = STEP_DEFS.map(s => `<div class="sidebar-item ${state.step === s.n ? 'active' : ''}" onclick="goStep(${s.n})"><span class="si-icon">${s.icon}</span><span>${s.label}</span></div>`).join('');
                let stepHtml = '';
                try {
                    if (state.step === 1) stepHtml = renderStep1();
                    else if (state.step === 2) stepHtml = renderStep2();
                    else if (state.step === 3) stepHtml = renderStep3();
                    else if (state.step === 4) stepHtml = renderStep4();
                    else if (state.step === 5) stepHtml = renderStep5();
                    else if (state.step === 6) stepHtml = renderStep6();
                    else if (state.step === 7) stepHtml = renderStep7();
                    else if (state.step === 8) stepHtml = renderStep8();
                    else if (state.step === 9) stepHtml = renderStep9();
                } catch (e) {
                    console.error("Step Render Error:", e);
                    stepHtml = `<div class="alert alert-error"><h3>⚠️ Step Rendering Error</h3><p>${e.message}</p><button class="btn btn-primary" onclick="state.step=1;renderCurrent()">Back to Calendar</button></div>`;
                }
                root.innerHTML = `<div class="app-layout">
                    <div class="sidebar slide-in">
                        <div class="sidebar-label">Admin Portal</div>${sidebarHtml}
                        <div class="sidebar-label" style="margin-top:20px">Tools</div>
                        <div class="sidebar-item" onclick="openBioModal()"><span class="si-icon">👤</span><span>Bio Data</span></div>
                        <div class="sidebar-item" onclick="clearData()"><span class="si-icon">🗑</span><span>Clear Data</span></div>
                    </div>
                    <div class="main-content">${stepHtml}</div>
                </div>`;
                return;
            }

            // PUBLIC VIEW
            adminBtn.innerHTML = '🔐 Admin'; adminBtn.className = 'g-btn g-btn-gold';
            const members = getActiveMembers(), svcDates = getServiceDatesForRoster();
            let totalPresent = 0, totalPossible = 0;
            svcDates.forEach(svc => {
                const dk = dateKey(svc.date);
                const att = state.memberAttendance[dk] || { entries: {} };
                const entries = att.entries || {};
                totalPresent += Object.values(entries).filter(e => e && e.present).length;
                totalPossible += members.length;
            });
            const nextSvcs = svcDates.filter(s => new Date(s.date) >= new Date()).slice(0, 4);
            const svcCards = nextSvcs.length > 0 ? nextSvcs.map(s => {
                const isSun = s.label.includes('Sunday');
                const dk = dateKey(s.date);
                return `<div class="pub-svc-card" onclick="openDrawer('${dk}')">
                  <div class="svc-emoji">${isSun ? '⛪' : '🎵'}</div>
                  <div class="svc-name">${isSun ? 'Sunday Service' : 'Midweek Service'}</div>
                  <div class="svc-date">${fmtDisplay(s.date)}</div>
                </div>`;
            }).join('') : `<div class="pub-svc-card" onclick="openDrawer()"><div class="svc-emoji">📋</div><div class="svc-name">View All Services</div><div class="svc-date">Open Service Log</div></div>`;

            root.innerHTML = `<div class="main-content" style="max-width:700px;margin:0 auto">
            <div class="pub-hero fade-in"><div class="month-chip">${MONTHS[state.month].toUpperCase()} ${state.year}</div>
              <h2>NRCC Circuit Department</h2><div class="pub-sub">Member Check-in & Service Hub</div>
              <div class="pub-stats"><div class="pub-stat"><div class="val">${members.length}</div><div class="lbl">Team Members</div></div>
                <div class="pub-stat"><div class="val">${totalPresent}</div><div class="lbl">Total Check-ins</div></div>
                <div class="pub-stat"><div class="val">${svcDates.length}</div><div class="lbl">Services</div></div></div>
              <button class="btn btn-primary" style="padding:14px 32px;font-size:15px" onclick="openDrawer()">📋 Mark Attendance</button>
            </div>
            <div class="glass fade-in"><div class="glass-header"><div class="glass-icon glass-icon-navy">📅</div><div><h2>Upcoming Services</h2><div class="subtitle">Tap a service to check in</div></div></div>
              <div class="pub-services">${svcCards}</div></div>
            <div style="text-align:center;padding:20px;color:var(--text-muted);font-size:12px">Administrative tools require authorized access. Tap "Admin" above.</div>
          </div>`;
        }

        // ══════════════════════════════════════════
        // INIT
        // ══════════════════════════════════════════
        try {
            if (!state.teamMembers || state.teamMembers.length === 0) {
                state.teamMembers = [...DEFAULT_STATE.teamMembers];
            }
            if (typeof initFirebase === 'function') initFirebase();
            if (typeof initJsonbin === 'function') initJsonbin();
            renderCurrent();
        } catch (e) {
            console.error("Init Error:", e);
            document.getElementById('appRoot').innerHTML = `<div class="alert alert-error">Critical Error: ${e.message}</div>`;
        }
    </script>
</body>

</html>
